// Pagamentos que já foram pagos online (fundo verde)
function isPagoOnline(payment){
  if(!payment) return false;
  const pagarNaLoja = ["Pagar na Retirada","Integra Card","pagar na loja","Pagar na loja"];
  return !pagarNaLoja.some(p=>payment.toLowerCase().includes(p.toLowerCase()));
}

// ── Arquivamento de cartões finalizados (Entregue/Cancelado) após 2 dias úteis ──
const ARQUIV_DIAS_UTEIS = 2;
function bpTermKey(polo,id){ return 'bp_term_'+(polo||'')+'_'+id; }
function bpGetTermTs(polo,id){ try{ const v=localStorage.getItem(bpTermKey(polo,id)); return v?(parseInt(v)||0):0; }catch(e){ return 0; } }
function bpSetTermTs(polo,id,ts){ try{ if(ts) localStorage.setItem(bpTermKey(polo,id),String(ts)); else localStorage.removeItem(bpTermKey(polo,id)); }catch(e){} }
function isStatusFinal(s){ return s==='Entregue' || s==='Cancelado'; }
function diasUteisDesde(ts){ if(!ts) return 0; let c=0; const a=new Date(ts); a.setHours(0,0,0,0); const b=new Date(); b.setHours(0,0,0,0); const d=new Date(a); while(d<b){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) c++; } return c; }
function estaArquivado(polo,id,status){ return isStatusFinal(status) && diasUteisDesde(bpGetTermTs(polo,id))>=ARQUIV_DIAS_UTEIS; }

// ====== KANBAN REUTILIZÁVEL (estilo Trello, arrastar e soltar) ======
function KanbanBoard({columns, items, itemKey, itemStatus, renderCard, onMove, onCardClick}){
  const [dragKey, setDragKey] = React.useState(null);
  const [overCol, setOverCol] = React.useState(null);
  function handleDrop(colKey){
    const it = items.find(i=>String(itemKey(i))===String(dragKey));
    setDragKey(null); setOverCol(null);
    if(it && itemStatus(it)!==colKey) onMove(it, colKey);
  }
  return (
    <div className="kb-board">
      {columns.map(col=>{
        const colItems = items.filter(i=>itemStatus(i)===col.key);
        return (
          <div key={col.key}
            className={`kb-col ${overCol===col.key?'kb-col-over':''}`}
            onDragOver={e=>{e.preventDefault();if(overCol!==col.key)setOverCol(col.key);}}
            onDragLeave={()=>{ setOverCol(o=>o===col.key?null:o); }}
            onDrop={e=>{e.preventDefault();handleDrop(col.key);}}>
            <div className="kb-col-head" style={{borderTopColor:col.color}}>
              <span className="kb-col-title" style={{color:col.color}}>{col.label}</span>
              <span className="kb-col-count" style={{background:col.color}}>{colItems.length}</span>
            </div>
            <div className="kb-col-body">
              {colItems.map(it=>(
                <div key={itemKey(it)} className="kb-card" draggable
                  onDragStart={e=>{setDragKey(itemKey(it)); e.dataTransfer.effectAllowed='move';}}
                  onDragEnd={()=>{setDragKey(null);setOverCol(null);}}
                  onClick={()=>onCardClick&&onCardClick(it)}>
                  {renderCard(it)}
                </div>
              ))}
              {colItems.length===0 && <div className="kb-empty">vazio</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ====== GESTÃO DE ESTOQUE (catálogo único, quantidade por polo) ======
function GestaoEstoque({activePolo, categories, setCategories, reloadProducts, notify}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [poloFilter,setPoloFilter]=useState('Todos');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState(null);
  const [pSel,setPSel]=useState({});
  const [pQty,setPQty]=useState({});
  const [tModal,setTModal]=useState(false);
  const [tForm,setTForm]=useState({key:'',from:activePolo,to:'',qty:''});

  useEffect(()=>{ load(); },[]);
  async function load(){
    setLoading(true);
    const {data}=await sb.from('products').select('*');
    setRows((data||[]).map(prodFromDB));
    setLoading(false);
  }

  function groupKey(r){ return (r.sku&&String(r.sku).trim())? 'sku:'+String(r.sku).trim().toLowerCase() : 'nm:'+String(r.name||'').trim().toLowerCase(); }
  const groupsMap={};
  rows.forEach(r=>{
    const k=groupKey(r);
    if(!groupsMap[k]) groupsMap[k]={key:k, sku:r.sku, name:r.name, category:r.category, price:r.price, cost:r.cost, photo:r.photo, description:r.description, minStock:r.minStock, polos:{}};
    groupsMap[k].polos[r.polo]=r;
  });
  const groups=Object.values(groupsMap).filter(g=>{
    const s=search.toLowerCase();
    const matchText=(g.name||'').toLowerCase().includes(s) || (g.sku||'').toLowerCase().includes(s) || (g.category||'').toLowerCase().includes(s);
    const matchPolo=poloFilter==='Todos' || !!g.polos[poloFilter];
    return matchText && matchPolo;
  }).sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  // Alertas de estoque baixo — somente nos polos habilitados a vender o item
  const lowAlerts=[];
  Object.values(groupsMap).forEach(g=>{
    Object.keys(g.polos).forEach(pid=>{
      if(poloFilter!=='Todos' && pid!==poloFilter) return;
      const r=g.polos[pid]; const min=r.minStock||5;
      if(r.stock<=min) lowAlerts.push({name:g.name, sigla:(POLOS[pid]&&POLOS[pid].sigla)||pid, stock:r.stock, min, zero:r.stock===0});
    });
  });
  lowAlerts.sort((a,b)=>a.stock-b.stock);

  // Lista de categorias: une as cadastradas + as já usadas em qualquer produto (todos os polos)
  const catOptions = Array.from(new Set([...(categories||[]), ...rows.map(r=>r.category)].map(c=>(c||'').trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b));

  function openNew(){
    setForm({base:'P'+Date.now(), name:'', sku:'', category:categories[0]||'', price:'', cost:'', minStock:5, photo:'', description:'', polos:{}});
    const sel={},qty={}; Object.keys(POLOS).forEach(pid=>{sel[pid]=false;qty[pid]='';});
    setPSel(sel); setPQty(qty); setModal(true);
  }
  function openEdit(g){
    setForm({base:(g.sku?g.sku:'P'+Date.now()), name:g.name, sku:g.sku||'', category:g.category||'', price:g.price, cost:g.cost, minStock:g.minStock||5, photo:g.photo||'', description:g.description||'', polos:g.polos});
    const sel={},qty={}; Object.keys(POLOS).forEach(pid=>{const r=g.polos[pid]; sel[pid]=!!r; qty[pid]=r?String(r.stock):'';});
    setPSel(sel); setPQty(qty); setModal(true);
  }

  async function saveGroup(){
    if(!form.name||!form.name.trim()){ notify('Informe o nome do produto','error'); return; }
    if(form.price===''||isNaN(parseFloat(form.price))){ notify('Informe o preço de venda','error'); return; }
    const selected=Object.keys(POLOS).filter(pid=>pSel[pid]);
    if(selected.length===0){ notify('Selecione ao menos um polo onde o produto é vendido','error'); return; }
    const sku=(form.sku&&form.sku.trim())|| ('SKU'+String(Date.now()).slice(-6));
    const ups=[];
    for(const pid of Object.keys(POLOS)){
      const existing=form.polos&&form.polos[pid];
      if(pSel[pid]){
        const id = existing? existing.id : `${form.base}_${pid}`;
        const qty = Math.max(0, parseInt(pQty[pid])||0);
        ups.push(prodToDB({id, name:form.name.trim(), category:form.category, price:form.price, cost:form.cost, stock:qty, minStock:form.minStock, sku, photo:form.photo, description:form.description}, pid));
        const before = existing? existing.stock : 0;
        if(qty!==before) registrarMov(pid, {id, name:form.name.trim(), sku}, qty>before?'ajuste_positivo':'ajuste_negativo', before, qty-before, 'Gestão de Estoque','','Gestão');
      } else if(existing){
        const {error:delErr}=await sb.from('products').eq('polo',pid).in('id',[String(existing.id)]).delete();
        if(delErr){ notify('Não foi possível remover o polo '+((POLOS[pid]&&POLOS[pid].sigla)||pid)+': '+delErr.message,'error'); }
      }
    }
    if(ups.length>0){ const {error}=await sb.from('products').upsert(ups); if(error){ notify('Erro ao salvar: '+error.message,'error'); return; } }
    // Categoria nova: registra para aparecer na lista nos próximos cadastros
    const catNova=(form.category||'').trim();
    if(catNova && setCategories && !(categories||[]).includes(catNova)){
      setCategories(prev=>Array.from(new Set([...(prev||[]), catNova])));
    }
    notify('Produto salvo!','success');
    setModal(false); setForm(null);
    await load(); if(reloadProducts) reloadProducts();
  }

  async function deleteGroup(g){
    if(poloFilter==='Todos'){
      if(!confirm(`Excluir "${g.name}" de TODOS os polos? Esta ação não pode ser desfeita.`)) return;
      let err=null;
      for(const pid of Object.keys(g.polos)){
        const {error}=await sb.from('products').eq('polo',pid).in('id',[String(g.polos[pid].id)]).delete();
        if(error) err=error;
      }
      if(err){ notify('Erro ao remover: '+err.message,'error'); return; }
      notify('Produto removido de todos os polos','success');
    } else {
      const r=g.polos[poloFilter];
      const sigla=(POLOS[poloFilter]&&POLOS[poloFilter].sigla)||poloFilter;
      if(!r){ notify('Este produto não está no polo '+sigla,'error'); return; }
      if(!confirm(`Remover "${g.name}" apenas do polo ${sigla}? Ele continuará disponível nos demais polos.`)) return;
      const {error}=await sb.from('products').eq('polo',poloFilter).in('id',[String(r.id)]).delete();
      if(error){ notify('Erro ao remover do polo '+sigla+': '+error.message,'error'); return; }
      notify('Produto removido do polo '+sigla,'success');
    }
    await load(); if(reloadProducts) reloadProducts();
  }

  function openTransfer(g){ setTForm({key:g?g.key:'', from:activePolo, to:'', qty:''}); setTModal(true); }
  async function doTransfer(){
    const g=groups.find(x=>x.key===tForm.key) || Object.values(groupsMap).find(x=>x.key===tForm.key);
    if(!g){ notify('Selecione o produto','error'); return; }
    const {from,to}=tForm; const q=parseInt(tForm.qty)||0;
    if(!from||!to||from===to){ notify('Escolha polos de origem e destino diferentes','error'); return; }
    if(q<=0){ notify('Quantidade inválida','error'); return; }
    const fromRow=g.polos[from];
    if(!fromRow||fromRow.stock<q){ notify('Estoque insuficiente no polo de origem','error'); return; }
    const toRow=g.polos[to];
    const ups=[ prodToDB({...fromRow, stock:fromRow.stock-q}, from) ];
    if(toRow) ups.push(prodToDB({...toRow, stock:toRow.stock+q}, to));
    else ups.push(prodToDB({id:`${(g.sku||'P'+Date.now())}_${to}`, name:g.name, category:g.category, price:g.price, cost:g.cost, stock:q, minStock:g.minStock, sku:g.sku, photo:g.photo, description:g.description}, to));
    const {error}=await sb.from('products').upsert(ups);
    if(error){ notify('Erro: '+error.message,'error'); return; }
    registrarMov(from,{id:fromRow.id,name:g.name,sku:g.sku},'transferencia_saida',fromRow.stock,-q,'Transf → '+POLOS[to].sigla,'','Gestão');
    registrarMov(to,{id:(toRow?toRow.id:`${g.sku}_${to}`),name:g.name,sku:g.sku},'transferencia_entrada',(toRow?toRow.stock:0),q,'Transf ← '+POLOS[from].sigla,'','Gestão');
    notify('Transferência realizada!','success');
    setTModal(false); await load(); if(reloadProducts) reloadProducts();
  }

  const totalUnidades = (poloFilter==='Todos' ? rows : rows.filter(r=>r.polo===poloFilter)).reduce((a,r)=>a+(r.stock||0),0);
  const catalogoCount = poloFilter==='Todos' ? Object.keys(groupsMap).length : Object.values(groupsMap).filter(g=>g.polos[poloFilter]).length;
  const poloSigla = (POLOS[poloFilter]&&POLOS[poloFilter].sigla)||poloFilter;

  return <div>
    <div className="stats-grid">
      <div className="stat-card"><div className="stat-icon">🏷️</div><div className="stat-label">{poloFilter==='Todos'?'Produtos no Catálogo':'Produtos em '+poloSigla}</div><div className="stat-value">{catalogoCount}</div></div>
      <div className="stat-card blue"><div className="stat-icon">📦</div><div className="stat-label">{poloFilter==='Todos'?'Unidades (todos os polos)':'Unidades · '+poloSigla}</div><div className="stat-value">{totalUnidades}</div></div>
      <div className="stat-card gold"><div className="stat-icon">🏪</div><div className="stat-label">Polos</div><div className="stat-value">{Object.keys(POLOS).length}</div></div>
    </div>

    <div className="flex justify-between items-center mb-3" style={{flexWrap:'wrap',gap:8}}>
      <div className="kb-hint">Estoque único · a quantidade de cada polo só é alterada aqui</div>
      <div className="flex gap-2">
        <button className="btn btn-sm" onClick={()=>openTransfer(null)}>🔄 Transferir entre polos</button>
        <button className="btn btn-primary btn-sm" onClick={openNew}>+ Novo Produto</button>
      </div>
    </div>

    {/* Filtro por polo */}
    <div className="flex gap-2 mb-3" style={{flexWrap:'wrap',alignItems:'center'}}>
      <span className="kb-hint" style={{marginBottom:0}}>Polo:</span>
      <button className={`btn btn-sm ${poloFilter==='Todos'?'btn-primary':''}`} onClick={()=>setPoloFilter('Todos')}>Todos os polos</button>
      {Object.values(POLOS).map(p=><button key={p.id} className={`btn btn-sm ${poloFilter===p.id?'btn-primary':''}`} onClick={()=>setPoloFilter(p.id)}>{p.sigla}</button>)}
    </div>

    {/* Alerta de estoque baixo (apenas polos habilitados) */}
    {lowAlerts.length>0 && (
      <div style={{background:'#fff7e6',border:'1px solid #e6a800',borderRadius:6,padding:'12px 16px',marginBottom:14}}>
        <div style={{fontFamily:'Oswald',fontSize:12,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'#9a6a00',marginBottom:8}}>
          ⚠ {lowAlerts.length} alerta{lowAlerts.length>1?'s':''} de estoque baixo{poloFilter!=='Todos'?` · ${(POLOS[poloFilter]&&POLOS[poloFilter].sigla)||poloFilter}`:''}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {lowAlerts.map((a,i)=>(
            <span key={i} className="kb-pill" style={{background:a.zero?'#fde8e8':'#fff4e0',color:a.zero?'#cc2222':'#9a6a00',border:'1px solid '+(a.zero?'#f3c2c2':'#f0d9a8')}}>
              {a.sigla} · {a.name} — {a.zero?'ESGOTADO':`${a.stock}/${a.min}`}
            </span>
          ))}
        </div>
      </div>
    )}

    {loading ? <div style={{textAlign:'center',padding:40,color:'#aaa',fontFamily:'Share Tech Mono',fontSize:10,letterSpacing:2}}>Carregando estoque de todos os polos...</div> : (
    <div className="card">
      <div className="search-box"><span className="search-icon">🔍</span><input placeholder="Buscar produto, SKU ou categoria..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <div className="table-wrap"><table>
        <thead><tr>{["Foto","Produto","SKU","Categoria","Preço","Estoque por polo",(poloFilter==='Todos'?'Total (todos)':('Estoque '+((POLOS[poloFilter]&&POLOS[poloFilter].sigla)||poloFilter))),"Ações"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>
          {!groups.length&&<tr><td colSpan={8} style={{textAlign:'center',padding:28,color:'#bbb'}}>Nenhum produto cadastrado</td></tr>}
          {groups.map(g=>{
            const total=Object.values(g.polos).reduce((a,r)=>a+(r.stock||0),0);
            const displayQty = poloFilter==='Todos' ? total : (g.polos[poloFilter]?(g.polos[poloFilter].stock||0):0);
            const polosToShow = Object.keys(POLOS).filter(pid=> (poloFilter==='Todos' || pid===poloFilter) && g.polos[pid]);
            return <tr key={g.key}>
              <td><div className="tbl-thumb">{g.photo?<img src={g.photo} alt=""/>:<span style={{fontFamily:"Share Tech Mono",fontSize:8,color:"#ccc"}}>SEM FOTO</span>}</div></td>
              <td><strong>{g.name}</strong></td>
              <td className="text-mono" style={{fontSize:9,color:'#aaa'}}>{g.sku||'—'}</td>
              <td className="text-mono" style={{fontSize:10}}>{g.category||'—'}</td>
              <td style={{fontFamily:'Bebas Neue',fontSize:15,letterSpacing:1}}>{fmt(g.price)}</td>
              <td>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {polosToShow.map(pid=>{
                    const r=g.polos[pid];
                    const low=r.stock<=(r.minStock||5);
                    return <span key={pid} className="kb-pill" style={{background:r.stock===0?'#fde8e8':low?'#fff4e0':'#eef7ee',color:r.stock===0?'#cc2222':low?'#9a6a00':'#1a6e2e',border:'1px solid '+(r.stock===0?'#f3c2c2':low?'#f0d9a8':'#bfe3c2')}}>{POLOS[pid].sigla} {r.stock}</span>;
                  })}
                  {polosToShow.length===0&&<span style={{color:'#bbb',fontSize:10}}>—</span>}
                </div>
              </td>
              <td style={{fontFamily:'Bebas Neue',fontSize:16}}>{displayQty}</td>
              <td><div className="flex gap-2">
                <button className="btn btn-sm" title="Editar / quantidades" onClick={()=>openEdit(g)}>✏</button>
                <button className="btn btn-sm" title="Transferir" onClick={()=>openTransfer(g)}>🔄</button>
                <button className="btn btn-sm btn-danger" title={poloFilter==='Todos'?'Excluir de todos os polos':('Remover do polo '+((POLOS[poloFilter]&&POLOS[poloFilter].sigla)||poloFilter))} onClick={()=>deleteGroup(g)}>🗑</button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table></div>
    </div>
    )}

    {modal&&form&&<Modal title={form.polos&&Object.keys(form.polos).length?'Editar Produto':'Novo Produto'} onClose={()=>{setModal(false);setForm(null);}} wide
      actions={[<button key="c" className="btn" onClick={()=>{setModal(false);setForm(null);}}>Cancelar</button>,<button key="s" className="btn btn-primary" onClick={saveGroup}>Salvar</button>]}>
      <div className="form-grid">
        <div className="form-group full"><label>Foto do Produto</label><PhotoUpload value={form.photo||""} onChange={v=>setForm({...form,photo:v})}/></div>
        <div className="form-group"><label>Nome *</label><input value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})}/></div>
        <div className="form-group"><label>SKU</label><input value={form.sku||""} placeholder="(gerado se vazio)" onChange={e=>setForm({...form,sku:e.target.value})}/></div>
        <div className="form-group full"><label>Categoria</label>
          <input list="ge-cats" placeholder="Escolha abaixo ou digite uma categoria nova" value={form.category||""} onChange={e=>setForm({...form,category:e.target.value})}/>
          <datalist id="ge-cats">{catOptions.map(c=><option key={c} value={c}/>)}</datalist>
          {catOptions.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
            {catOptions.map(c=>(
              <span key={c} onClick={()=>setForm({...form,category:c})} className={`ge-polochip ${form.category===c?'on':''}`}>{c}</span>
            ))}
          </div>}
          {form.category && form.category.trim() && !catOptions.includes(form.category.trim()) && <div style={{fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:1,color:'#1a6e2e',marginTop:6}}>+ Nova categoria "{form.category.trim()}" será criada ao salvar</div>}
        </div>
        <div className="form-group"><label>Preço Venda *</label><input type="number" step="0.01" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></div>
        <div className="form-group"><label>Custo</label><input type="number" step="0.01" value={form.cost} onChange={e=>setForm({...form,cost:e.target.value})}/></div>
        <div className="form-group"><label>Estoque Mínimo (alerta)</label><input type="number" value={form.minStock} onChange={e=>setForm({...form,minStock:e.target.value})}/></div>
        <div className="form-group full"><label>Descrição</label><textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></div>
      </div>
      <div className="section-divider">🏪 Polos onde é vendido · quantidade em cada</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
        {Object.values(POLOS).map(p=>(
          <span key={p.id} className={`ge-polochip ${pSel[p.id]?'on':''}`} onClick={()=>setPSel({...pSel,[p.id]:!pSel[p.id]})}>
            {pSel[p.id]?'✓':'＋'} {p.sigla} — {p.nome.split(' ').slice(0,2).join(' ')}
          </span>
        ))}
      </div>
      <div>
        {Object.values(POLOS).filter(p=>pSel[p.id]).map(p=>(
          <div key={p.id} className="ge-polo-qty">
            <div style={{fontFamily:'Oswald',fontSize:12,letterSpacing:1,textTransform:'uppercase',color:'#333'}}>{p.sigla} — {p.nome}</div>
            <input type="number" min="0" placeholder="Qtd" value={pQty[p.id]} onChange={e=>setPQty({...pQty,[p.id]:e.target.value})}/>
          </div>
        ))}
        {Object.values(POLOS).filter(p=>pSel[p.id]).length===0&&<div style={{textAlign:'center',padding:'12px',color:'#bbb',fontFamily:'Share Tech Mono',fontSize:11,letterSpacing:1}}>Selecione acima os polos onde o produto será vendido</div>}
      </div>
    </Modal>}

    {tModal&&<Modal title="Transferir entre polos" onClose={()=>setTModal(false)}
      actions={[<button key="c" className="btn" onClick={()=>setTModal(false)}>Cancelar</button>,<button key="s" className="btn btn-primary" onClick={doTransfer}>Transferir</button>]}>
      <div className="form-grid">
        <div className="form-group full"><label>Produto</label>
          <select value={tForm.key} onChange={e=>setTForm({...tForm,key:e.target.value})}>
            <option value="">Selecionar produto...</option>
            {Object.values(groupsMap).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(g=><option key={g.key} value={g.key}>{g.name}{g.sku?' ('+g.sku+')':''}</option>)}
          </select>
        </div>
        <div className="form-group"><label>De (origem)</label>
          <select value={tForm.from} onChange={e=>setTForm({...tForm,from:e.target.value})}>
            {Object.values(POLOS).map(p=>{const g=groupsMap[tForm.key]; const r=g&&g.polos[p.id]; return <option key={p.id} value={p.id}>{p.sigla}{r?' — '+r.stock+' un.':' — 0 un.'}</option>;})}
          </select>
        </div>
        <div className="form-group"><label>Para (destino)</label>
          <select value={tForm.to} onChange={e=>setTForm({...tForm,to:e.target.value})}>
            <option value="">Selecionar...</option>
            {Object.values(POLOS).map(p=><option key={p.id} value={p.id}>{p.sigla} — {p.nome.split(' ').slice(0,2).join(' ')}</option>)}
          </select>
        </div>
        <div className="form-group"><label>Quantidade</label><input type="number" min="1" value={tForm.qty} onChange={e=>setTForm({...tForm,qty:e.target.value})}/></div>
      </div>
    </Modal>}
  </div>;
}

function PedidosOnline({sales, setSales, products, setProducts, notify, customers, polo}){
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('Todos');
  const [showArchived, setShowArchived] = useState(false);

  const pedidosMap = {};
  sales.filter(s => s.type === 'online').forEach(s => {
    const key = s.orderNum || (s.customer + '|' + s.date);
    if(!pedidosMap[key]){
      const cli = customers.find(c=>c.name===s.customer);
      let initialStatus = 'Separar';
      if(s.pedidoStatus) initialStatus = s.pedidoStatus;
      else if(s.status === 'Concluído') initialStatus = 'Entregue';
      pedidosMap[key] = {
        id: key,
        customer: s.customer,
        phone: cli ? cli.phone : '',
        date: s.date,
        ts: s.ts || 0,
        payment: s.payment,
        pagoOnline: isPagoOnline(s.payment),
        items: [],
        total: 0,
        status: initialStatus,
        saleIds: []
      };
    }
    pedidosMap[key].items.push(s);
    pedidosMap[key].total += s.total;
    pedidosMap[key].saleIds.push(s.id);
    if(s.pedidoStatus) pedidosMap[key].status = s.pedidoStatus;
  });

  const pedidos = Object.values(pedidosMap).sort((a,b) => b.ts - a.ts);
  // marca quando um pedido chegou a um estado final (para arquivar depois de 2 dias úteis)
  useEffect(()=>{ pedidos.forEach(p=>{ if(isStatusFinal(p.status) && !bpGetTermTs(polo,p.id)) bpSetTermTs(polo,p.id,Date.now()); }); }, [sales]);
  const pedidosArquivados = pedidos.filter(p=>estaArquivado(polo,p.id,p.status));
  const pedidosAtivos = pedidos.filter(p=>!estaArquivado(polo,p.id,p.status));

  const filtered = pedidos.filter(p =>
    (statusFilter === 'Todos' || p.status === statusFilter) &&
    (p.customer.toLowerCase().includes(search.toLowerCase()))
  );

  const stats = {
    total:   pedidos.length,
    separar: pedidos.filter(p => ['Separar','Em Separação'].includes(p.status)).length,
    prontos: pedidos.filter(p => p.status === 'Pronto p/ Retirar').length,
    pagos:   pedidos.filter(p => p.status === 'Pago').length,
  };

  function updateStatus(pedido, newStatus){
    const wasCancelled = pedido.status === 'Cancelado';
    const willCancel   = newStatus === 'Cancelado';
    // Quantidade total por produto deste pedido (ignora linhas de encomenda)
    function unidadesPorProduto(prodId){
      return pedido.items
        .filter(it=>!it.isEncomenda)
        .reduce((sum,it)=> String(it.productId)===String(prodId) ? sum+(it.qty||0) : sum, 0);
    }
    if(setProducts){
      if(willCancel && !wasCancelled){
        // Cancelar: devolve as unidades ao estoque
        setProducts(prev => prev.map(p => {
          const restore = unidadesPorProduto(p.id);
          return restore>0 ? {...p, stock:(p.stock||0)+restore} : p;
        }));
      } else if(wasCancelled && !willCancel){
        // Reativar pedido cancelado: retira novamente do estoque
        setProducts(prev => prev.map(p => {
          const take = unidadesPorProduto(p.id);
          return take>0 ? {...p, stock:Math.max(0,(p.stock||0)-take)} : p;
        }));
      }
    }
    setSales(prev => prev.map(s => {
      if(pedido.saleIds.includes(s.id)){
        return {...s,
          status: newStatus === 'Entregue' ? 'Concluído' : newStatus,
          pedidoStatus: newStatus
        };
      }
      return s;
    }));
    if(isStatusFinal(newStatus)){ if(!bpGetTermTs(polo,pedido.id)) bpSetTermTs(polo,pedido.id,Date.now()); }
    else { bpSetTermTs(polo,pedido.id,0); }
    if(selected && selected.id === pedido.id) setSelected({...selected, status: newStatus});
    const extra = (willCancel && !wasCancelled) ? ' · estoque devolvido' : '';
    notify(`Pedido de ${pedido.customer} → ${newStatus}${extra}`, 'success');
  }

  // próximo status lógico no fluxo
  function nextStatus(current, pagoOnline){
    if(current==='Separar')          return 'Em Separação';
    if(current==='Em Separação')     return 'Pronto p/ Retirar';
    if(current==='Pronto p/ Retirar') return pagoOnline ? 'Entregue' : 'Pago';
    if(current==='Pago')             return 'Entregue';
    return null;
  }

  const pipelineColors = {
    "Separar":           "#1a4e8e",
    "Em Separação":      "#996622",
    "Pronto p/ Retirar": "#1a6e2e",
    "Pago":              "#00643c",
    "Entregue":          "#444",
    "Cancelado":         "#cc2222"
  };

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon">🛒</div><div className="stat-label">Total Pedidos Online</div><div className="stat-value">{stats.total}</div></div>
        <div className="stat-card blue"><div className="stat-icon">📦</div><div className="stat-label">Para Separar</div><div className="stat-value">{stats.separar}</div></div>
        <div className="stat-card green"><div className="stat-icon">✅</div><div className="stat-label">Prontos p/ Retirada</div><div className="stat-value">{stats.prontos}</div></div>
        <div className="stat-card"><div className="stat-icon">💰</div><div className="stat-label">Pagos / Aguard. Pgto</div><div className="stat-value">{stats.pagos}</div></div>
      </div>

      {/* Busca + Kanban */}
      <div className="flex justify-between items-center mb-3" style={{flexWrap:'wrap',gap:8}}>
        <div className="kb-hint">{showArchived?'📁 Arquivadas — entregues/cancelados há mais de 2 dias úteis':'🖱️ Arraste os cartões entre as colunas · clique para ver detalhes'}</div>
        <div className="flex gap-2 items-center">
          <button className={`btn btn-sm ${showArchived?'btn-primary':''}`} onClick={()=>setShowArchived(a=>!a)}>{showArchived?'← Voltar ao quadro':`📁 Arquivadas (${pedidosArquivados.length})`}</button>
          <div className="search-box" style={{maxWidth:240,margin:0}}><span className="search-icon">🔍</span><input placeholder="Buscar por cliente..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        </div>
      </div>

      <KanbanBoard
        columns={(showArchived?['Entregue','Cancelado']:PEDIDO_STATUS).map(s=>({key:s,label:s,color:pipelineColors[s]||'#888'}))}
        items={(showArchived?pedidosArquivados:pedidosAtivos).filter(p=>p.customer.toLowerCase().includes(search.toLowerCase()))}
        itemKey={p=>p.id}
        itemStatus={p=>p.status}
        onMove={(p,to)=>updateStatus(p,to)}
        onCardClick={p=>setSelected(p)}
        renderCard={p=>(
          <div style={{borderLeft:p.pagoOnline?'3px solid #66bb6a':'3px solid transparent',paddingLeft:p.pagoOnline?7:0,marginLeft:p.pagoOnline?-4:0}}>
            <div className="kb-card-title">{p.customer}</div>
            <div className="kb-card-sub">{p.date} · {p.payment}</div>
            {p.phone && <div className="kb-card-sub" style={{marginTop:2,color:'#1a6e2e'}}>📱 {p.phone}</div>}
            <div style={{margin:'7px 0 2px',borderTop:'1px dashed #ececec',paddingTop:6}}>
              {p.items.map((it,i)=><div key={i} style={{fontSize:11,color:'#555',lineHeight:1.55,display:'flex',justifyContent:'space-between',gap:6}}><span><strong style={{color:'#111'}}>{it.qty}×</strong> {it.productName}</span><span style={{color:'#999',whiteSpace:'nowrap'}}>R${it.total.toFixed(2)}</span></div>)}
            </div>
            <div className="kb-card-row">
              <span className="kb-card-total">R${p.total.toFixed(2)}</span>
              {p.pagoOnline
                ? <span className="kb-pill" style={{background:'#e8f5e9',color:'#1a6e2e',border:'1px solid #a5d6a7'}}>PAGO</span>
                : <span className="kb-pill" style={{background:'#fff3e0',color:'#bf360c',border:'1px solid #f0c39a'}}>PAGAR NA LOJA</span>}
            </div>
          </div>
        )}
      />

      {/* Modal detalhe */}
      {selected&&(
        <Modal title={"Pedido — "+selected.customer} onClose={()=>setSelected(null)} wide
          actions={[
            <button key="c" className="btn" onClick={()=>setSelected(null)}>Fechar</button>,
            ...PEDIDO_STATUS.filter(s=>s!==selected.status&&s!=='Cancelado').map(s=>(
              <button key={s} className="btn btn-sm btn-primary" onClick={()=>updateStatus(selected,s)}>{s}</button>
            )),
            selected.status!=='Cancelado'&&<button key="x" className="btn btn-sm btn-danger" onClick={()=>{updateStatus(selected,'Cancelado');setSelected(null);}}>Cancelar pedido</button>
          ].filter(Boolean)}>

          {/* Banner pago/não pago */}
          {selected.pagoOnline
            ? <div style={{background:'#e8f5e9',border:'1px solid #a5d6a7',borderRadius:4,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#1a6e2e',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:16}}>✅</span> <strong>Pagamento já confirmado</strong> — realizado online via {selected.payment}
              </div>
            : <div style={{background:'#fff3e0',border:'1px solid #e65100',borderRadius:4,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#bf360c',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:16}}>⚠</span> <strong>Pagamento pendente na retirada</strong> — cobrar na entrega
              </div>
          }

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:18}}>
            {[['Cliente',selected.customer],['Data',selected.date],['Telefone',selected.phone||'—'],['Pagamento',selected.payment],['Status',selected.status]].map(([l,v])=>(
              <div key={l}>
                <div style={{fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:2,color:'#aaa',textTransform:'uppercase',marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,fontWeight:500}}>{l==='Status'?<span className={`tag ${PEDIDO_STATUS_CLS[v]||'tag-pending'}`}>{v}</span>:v}</div>
              </div>
            ))}
          </div>

          {/* Seção WhatsApp */}
          <div style={{background:'#f0faf4',border:'1px solid #b2dfdb',borderRadius:6,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:2,color:'#00796b',textTransform:'uppercase',marginBottom:10}}>
              📲 Notificar cliente via WhatsApp
            </div>
            {selected.phone ? (
              <div className="flex gap-2" style={{flexWrap:'wrap'}}>
                {['Em Separação','Pronto p/ Retirar','Pago','Entregue','Cancelado'].map(s=>{
                  const msg = waMensagem(s, selected, polo);
                  if(!msg) return null;
                  const isCurrentStatus = s === selected.status;
                  return (
                    <a key={s} href={waLink(selected.phone, msg)} target="_blank" rel="noopener noreferrer"
                      style={{display:'inline-flex',alignItems:'center',gap:5,padding:'6px 12px',
                        background: isCurrentStatus ? '#25D366' : '#fff',
                        color: isCurrentStatus ? '#fff' : '#25D366',

// ====== ALTERAR SENHA DO OPERADOR (logado, sabe a senha atual) ======
function AlterarSenhaOperadorModal({operador, onClose, onSuccess}){
  const [atual,  setAtual]   = useState('');
  const [nova,   setNova]    = useState('');
  const [conf,   setConf]    = useState('');
  const [err,    setErr]     = useState('');
  const [loading,setLoading] = useState(false);

  async function salvar(){
    setErr('');
    if(!atual||!nova||!conf){ setErr('Preencha todos os campos.'); return; }
    if(nova.length<4){ setErr('A nova senha deve ter pelo menos 4 caracteres.'); return; }
    if(nova!==conf){ setErr('As senhas não coincidem.'); return; }
    setLoading(true);
    try{
      // verifica senha atual
      const {data} = await sb.from('operadores').select('password').eq('id',operador.id).single();
      if(!data||data.password!==atual){ setErr('Senha atual incorreta.'); setLoading(false); return; }
      const {error} = await sb.from('operadores').eq('id',operador.id).update({password:nova});
      if(error){ setErr('Erro ao salvar. Tente novamente.'); setLoading(false); return; }
      onSuccess&&onSuccess();
      onClose();
    } catch(e){ setErr('Erro ao salvar. Tente novamente.'); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:380}}>
        <div className="modal-title">🔑 Alterar Senha<button className="modal-close" onClick={onClose}>✕</button></div>
        {err&&<div style={{background:'rgba(204,34,34,.08)',border:'1px solid rgba(204,34,34,.2)',borderRadius:3,padding:'9px 12px',fontSize:12,color:'var(--danger)',marginBottom:14}}>{err}</div>}
        <div className="form-group mb-3"><label>Senha Atual *</label><input type="password" placeholder="••••••••" value={atual} onChange={e=>setAtual(e.target.value)}/></div>
        <div className="form-group mb-3"><label>Nova Senha *</label><input type="password" placeholder="Mínimo 4 caracteres" value={nova} onChange={e=>setNova(e.target.value)}/></div>
        <div className="form-group mb-4"><label>Confirmar Nova Senha *</label><input type="password" placeholder="Repita a nova senha" value={conf} onChange={e=>setConf(e.target.value)} onKeyDown={e=>e.key==='Enter'&&salvar()}/></div>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={salvar} disabled={loading}>{loading?'Salvando...':'✓ Salvar'}</button>
        </div>
      </div>
    </div>
  );
}

// ── Cliente REST puro (sem biblioteca, sem postMessage) ───────────────────────
const sb = {
  _h(extra={}){
    return {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,...extra};
  },
  _base(table){ return SUPA_URL+'/rest/v1/'+table; },

  from(table){
    const q = {_table:table, _filters:[], _order:null, _head:false, _count:false, _limit:null};

    q.select = function(cols='*', opts={}){
      this._cols = cols;
      if(opts.count==='exact') this._count=true;
      if(opts.head) this._head=true;
      return this;
    };
    q.eq    = function(col,val){ this._filters.push(`${col}=eq.${encodeURIComponent(val)}`); return this; };
    q.not   = function(col,op,val){ this._filters.push(`${col}=not.${op}.${encodeURIComponent(val)}`); return this; };
    q.in    = function(col,vals){ this._filters.push(`${col}=in.(${vals.map(v=>`"${v}"`).join(',')})`); return this; };
    q.order = function(col,{ascending=true}={}){ this._order=`${col}.${ascending?'asc':'desc'}`; return this; };
    q.single= function(){ this._single=true; return this; };
    q.limit = function(n){ this._limit=n; return this; };

    q._url  = function(){
      let url = sb._base(this._table)+'?';
      url += 'select='+(this._cols||'*');
      this._filters.forEach(f=>{ url += '&'+f; });
      if(this._order) url += '&order='+this._order;
      if(this._limit) url += '&limit='+this._limit;
      return url;
    };

    q._fetch = async function(method, body, extra={}){
      const headers = sb._h(extra);
      if(this._count) headers['Prefer']='count=exact';
      const opts = {method, headers};
      if(body!==undefined) opts.body = JSON.stringify(body);
      const res = await fetch(this._url(), opts);
      if(this._head||method==='DELETE'){
        if(!res.ok){ let t=''; try{t=await res.text();}catch(e){} return {data:null, error:{message:t||res.statusText}, count:0}; }
        return {data:null,error:null,count:0};
      }
      const text = await res.text();
      let data = null;
      try{ data = text ? JSON.parse(text) : null; }catch(e){ data=null; }
      if(!res.ok){ return {data:null, error:{message:text||res.statusText}}; }
      if(this._count){ const c=res.headers.get('content-range'); return {data,error:null,count:c?parseInt(c.split('/')[1]||0):0}; }
      if(this._single) return {data: Array.isArray(data)?data[0]||null : data, error:null};
      return {data: data||[], error:null};
    };

    q.then = function(resolve){ return this._fetch('GET').then(resolve); };

    q.insert = function(rows){
      const body = Array.isArray(rows)?rows:[rows];
      return this._fetch('POST', body, {'Prefer':'return=minimal'});
    };
    q.upsert = function(rows, opts={}){
      const body = Array.isArray(rows)?rows:[rows];
      const onConflict = opts.onConflict||'id';
      // upsert via POST com on_conflict na query string
      const origUrl = this._url.bind(this);
      this._url = ()=> origUrl() + '&on_conflict=' + onConflict;
      return this._fetch('POST', body, {'Prefer':'resolution=merge-duplicates,return=minimal'});
    };
    q.update = function(obj){
      return this._fetch('PATCH', obj, {'Prefer':'return=minimal'});
    };
    q.delete = function(){
      return this._fetch('DELETE', undefined, {'Prefer':'return=minimal'});
    };

    return q;
  }
};

function prodToDB(p,polo){return{id:String(p.id),polo,name:p.name,category:p.category||'',price:parseFloat(p.price)||0,cost:parseFloat(p.cost)||0,stock:parseInt(p.stock)||0,min_stock:parseInt(p.minStock)||5,sku:p.sku||'',photo:p.photo||'',description:p.description||''};}
function custFromDB(r){return{id:r.id,name:r.name,email:r.email,phone:r.phone,cpf:r.cpf,rg:r.rg,birthdate:r.birthdate,school:r.school,grade:r.grade,enrollment:r.enrollment,address:r.address,neighborhood:r.neighborhood,city:r.city,state:r.state,cep:r.cep,parentName:r.parent_name,parentPhone:r.parent_phone,parentEmail:r.parent_email,parentCpf:r.parent_cpf,password:r.password,totalPurchases:r.total_purchases,createdAt:r.created_at};}
function custToDB(c,polo){return{id:String(c.id),polo,name:c.name||'',email:c.email||'',phone:c.phone||'',cpf:c.cpf||'',rg:c.rg||'',birthdate:c.birthdate||'',school:c.school||'',grade:c.grade||'',enrollment:c.enrollment||'',address:c.address||'',neighborhood:c.neighborhood||'',city:c.city||'',state:c.state||'',cep:c.cep||'',parent_name:c.parentName||'',parent_phone:c.parentPhone||'',parent_email:c.parentEmail||'',parent_cpf:c.parentCpf||'',password:c.password||'123456',total_purchases:c.totalPurchases||0,created_at:c.createdAt||''};}
function saleFromDB(r){return{id:r.id,productId:r.product_id,productName:r.product_name,qty:r.qty,unitPrice:parseFloat(r.unit_price),total:parseFloat(r.total),cost:parseFloat(r.cost),month:r.month,week:r.week,date:r.date,ts:r.ts,payment:r.payment,type:r.type,status:r.status,customer:r.customer,orderNum:r.order_num,orderTs:r.order_ts,pedidoStatus:r.pedido_status};}
function saleToDB(s,polo){return{id:String(s.id),polo,product_id:String(s.productId||''),product_name:s.productName||'',qty:s.qty||1,unit_price:parseFloat(s.unitPrice||s.total/s.qty)||0,total:parseFloat(s.total)||0,cost:parseFloat(s.cost)||0,month:s.month||0,week:s.week||0,date:s.date||'',ts:s.ts||0,payment:s.payment||'',type:s.type||'loja',status:s.status||'Concluído',customer:s.customer||'',order_num:s.orderNum||'',order_ts:s.orderTs||0,pedido_status:s.pedidoStatus||''};}
function encFromDB(r){return{...r,clientePhone:r.cliente_phone,clienteEmail:r.cliente_email,precoTotal:r.preco_total,sinalPago:r.sinal_pago,prazoEntrega:r.prazo_entrega,dataPedido:r.data_pedido};}
function encToDB(e,polo){return{id:String(e.id),polo,numero:e.numero||'',tipo:e.tipo||'',status:e.status||'Novo Pedido',prioridade:e.prioridade||'Normal',cliente:e.cliente||'',cliente_phone:e.clientePhone||'',cliente_email:e.clienteEmail||'',escola:e.escola||'',descricao:e.descricao||'',items:e.items||[],medidas:e.medidas||{},preco_total:e.precoTotal||'',sinal:e.sinal||'',sinal_pago:e.sinalPago||false,prazo_entrega:e.prazoEntrega||'',data_pedido:e.dataPedido||'',obs:e.obs||'',historico:e.historico||[]};}
function orcFromDB(r){return{...r,clienteId:r.cliente_id};}
function orcToDB(o,polo){return{id:String(o.id),polo,numero:o.numero||'',cliente:o.cliente||'',cliente_id:String(o.clienteId||o.cliente_id||''),items:o.items||[],total:parseFloat(o.total)||0,status:o.status||'Aberto',obs:o.obs||''};}

// ── seed inicial (só roda se o banco estiver vazio) ───────────────────────────
async function seedIfEmpty(polo){
  const {count}=await sb.from('products').select('*',{count:'exact',head:true}).eq('polo',polo);
  if(count>0) return;
  // Cada polo recebe o catálogo base com IDs únicos e estoque levemente variado
  const poloIndex = Object.keys(POLOS).indexOf(polo);
  const idOffset  = poloIndex * 100;
  const stockFator = poloIndex === 0 ? 1 : 0.6 + Math.random()*0.3;
  const prods = INIT_PRODS.map(p=>({...p, id:p.id+idOffset, stock:Math.max(1,Math.floor(p.stock*stockFator))}));
  await sb.from('products').upsert(prods.map(p=>prodToDB(p,polo)));
  const cats = INIT_CATS.map((name,i)=>({id:`${polo}-cat-${i}`,polo,name}));
  await sb.from('categories').upsert(cats);
  // Clientes de demonstração apenas no polo SAD
  if(polo==='sad'){
    await sb.from('customers').upsert(INIT_CUSTOMERS_DB.map(c=>custToDB({...c,id:String(c.id)},polo)));
  }
}

// ── cache local por polo (carregamento instantâneo + revalidação em 2º plano) ──
function bpReadCache(polo){ try{ return JSON.parse(localStorage.getItem('bp_cache_'+polo)||'null'); }catch(e){ return null; } }
function bpWriteCache(polo,data){
  try{ localStorage.setItem('bp_cache_'+polo, JSON.stringify(data)); return; }catch(e){}
  // fallback leve se estourar a cota (sem fotos, vendas recentes)
  try{ localStorage.setItem('bp_cache_'+polo, JSON.stringify({...data, products:(data.products||[]).map(p=>({...p,photo:''})), sales:(data.sales||[]).slice(0,300)})); }catch(e){}
}

// ── hook principal por polo ───────────────────────────────────────────────────
function usePoloData(polo){
  const [products,  setProductsLocal]  = useState([]);
  const [sales,     setSalesLocal]     = useState([]);
  const [customers, setCustomersLocal] = useState([]);
  const [categories,setCategoriesLocal]= useState([]);
  const [encomendas,setEncomendasLocal]= useState([]);
  const [orcamentos,setOrcamentosLocal]= useState([]);
  const [loading,   setLoading]        = useState(true);
  const [syncStatus,setSyncStatus]     = useState('idle'); // 'idle'|'saving'|'saved'|'error'

  useEffect(()=>{
    if(!polo) return;
    let alive=true;
    // 1) pinta na hora com o cache local (reload instantâneo)
    const cached=bpReadCache(polo);
    if(cached){
      setProductsLocal(cached.products||[]);
      setSalesLocal(cached.sales||[]);
      setCustomersLocal(cached.customers||[]);
      setCategoriesLocal(cached.categories||[]);
      setEncomendasLocal(cached.encomendas||[]);
      setOrcamentosLocal(cached.orcamentos||[]);
      setLoading(false);
    } else {
      setLoading(true);
    }
    // 2) revalida em segundo plano a partir do Supabase
    (async()=>{
      if(!cached) await seedIfEmpty(polo);
      const [p,s,c,cat,enc,orc] = await Promise.all([
        sb.from('products'  ).select('*').eq('polo',polo),
        sb.from('sales'     ).select('*').eq('polo',polo).order('ts',{ascending:false}),
        sb.from('customers' ).select('*').eq('polo',polo),
        sb.from('categories').select('*').eq('polo',polo),
        sb.from('encomendas').select('*').eq('polo',polo).order('created_at',{ascending:false}),
        sb.from('orcamentos').select('*').eq('polo',polo).order('created_at',{ascending:false}),
      ]);
      if(!alive) return;
      const nproducts=(p.data||[]).map(prodFromDB);
      const nsales=(s.data||[]).map(saleFromDB);
      const ncustomers=(c.data||[]).map(custFromDB);
      const ncategories=(cat.data||[]).map(r=>r.name);
      const nencomendas=(enc.data||[]).map(encFromDB);
      const norcamentos=(orc.data||[]).map(orcFromDB);
      setProductsLocal(nproducts);
      setSalesLocal(nsales);
      setCustomersLocal(ncustomers);
      setCategoriesLocal(ncategories);
      setEncomendasLocal(nencomendas);
      setOrcamentosLocal(norcamentos);
      setLoading(false);
      bpWriteCache(polo,{products:nproducts,sales:nsales,customers:ncustomers,categories:ncategories,encomendas:nencomendas,orcamentos:norcamentos});
    })();
    return ()=>{ alive=false; };
  },[polo]);

  // ── setters que sincronizam com Supabase ─────────────────────────────────────
  function flash(ok){
    setSyncStatus(ok?'saved':'error');
    setTimeout(()=>setSyncStatus('idle'),2000);
  }

  async function setProducts(val){
    const next = typeof val==='function' ? val(products) : val;
    setProductsLocal(next);
    setSyncStatus('saving');
    // upsert novos/alterados
    const prevMap = Object.fromEntries(products.map(p=>[String(p.id),p]));
    const toUpsert = next.filter(p=>{ const o=prevMap[String(p.id)]; return !o||JSON.stringify(prodToDB(o,polo))!==JSON.stringify(prodToDB(p,polo)); });
    // deletar removidos
    const nextIds = new Set(next.map(p=>String(p.id)));
    const toDelete = products.filter(p=>!nextIds.has(String(p.id))).map(p=>String(p.id));
    let error=null;
    if(toUpsert.length>0){ const r=await sb.from('products').upsert(toUpsert.map(p=>prodToDB(p,polo))); error=r.error; }
    if(toDelete.length>0){ await sb.from('products').eq('polo',polo).in('id',toDelete).delete(); }
    flash(!error);
  }

  async function setSales(val){
    const next = typeof val==='function' ? val(sales) : val;
    setSalesLocal(next);
    setSyncStatus('saving');
    const existingIds = new Set(sales.map(s=>String(s.id)));
    const toUpsert = next.filter(s=>!existingIds.has(String(s.id)));
    const changed = next.filter(s=>{ const o=sales.find(x=>String(x.id)===String(s.id)); return o&&(o.status!==s.status||o.pedidoStatus!==s.pedidoStatus||o.stock!==s.stock); });
    const all=[...toUpsert,...changed];
    if(all.length>0){ const {error}=await sb.from('sales').upsert(all.map(s=>saleToDB(s,polo))); flash(!error); }
    else flash(true);
  }

  async function setCustomers(val){
    const prev = customers;
    const next = typeof val==='function' ? val(prev) : val;
    setCustomersLocal(next);
    setSyncStatus('saving');
    const prevMap = Object.fromEntries(prev.map(c=>[String(c.id),c]));
    const toUpsert = next.filter(c=>{ const o=prevMap[String(c.id)]; return !o||JSON.stringify(custToDB(o,polo))!==JSON.stringify(custToDB(c,polo)); });
    const nextIds = new Set(next.map(c=>String(c.id)));
    const toDelete = prev.filter(c=>!nextIds.has(String(c.id))).map(c=>String(c.id));
    let error=null;
    if(toUpsert.length>0){ const r=await sb.from('customers').upsert(toUpsert.map(c=>custToDB(c,polo))); error=r.error; }
    if(toDelete.length>0){ await sb.from('customers').eq('polo',polo).in('id',toDelete).delete(); }
    flash(!error);
  }

  async function setCategories(val){
    const next = typeof val==='function' ? val(categories) : val;
    setCategoriesLocal(next);
    setSyncStatus('saving');
    const rows=next.map((name,i)=>({id:`${polo}-cat-${i}-${name.toLowerCase().replace(/\s+/g,'_')}`,polo,name}));
    await sb.from('categories').eq('polo',polo).delete();
    const {error}=next.length>0 ? await sb.from('categories').insert(rows) : {error:null};
    flash(!error);
  }

  async function setEncomendas(val){
    const next = typeof val==='function' ? val(encomendas) : val;
    setEncomendasLocal(next);
    setSyncStatus('saving');
    const prevMap = Object.fromEntries(encomendas.map(e=>[String(e.id),e]));
    const toUpsert = next.filter(e=>{ const o=prevMap[String(e.id)]; return !o||JSON.stringify(encToDB(o,polo))!==JSON.stringify(encToDB(e,polo)); });
    const nextIds = new Set(next.map(e=>String(e.id)));
    const toDelete = encomendas.filter(e=>!nextIds.has(String(e.id))).map(e=>String(e.id));
    let error=null;
    if(toUpsert.length>0){ const r=await sb.from('encomendas').upsert(toUpsert.map(e=>encToDB(e,polo))); error=r.error; }
    if(toDelete.length>0){ await sb.from('encomendas').eq('polo',polo).in('id',toDelete).delete(); }
    flash(!error);
  }

  async function setOrcamentos(val){
    const next = typeof val==='function' ? val(orcamentos) : val;
    setOrcamentosLocal(next);
    setSyncStatus('saving');
    const prevMap = Object.fromEntries(orcamentos.map(o=>[String(o.id),o]));
    const toUpsert = next.filter(o=>{ const p=prevMap[String(o.id)]; return !p||p.status!==o.status||JSON.stringify(p.items)!==JSON.stringify(o.items); });
    const nextIds = new Set(next.map(o=>String(o.id)));
    const toDelete = orcamentos.filter(o=>!nextIds.has(String(o.id))).map(o=>String(o.id));
    let error=null;
    if(toUpsert.length>0){ const r=await sb.from('orcamentos').upsert(toUpsert.map(o=>orcToDB(o,polo))); error=r.error; }
    if(toDelete.length>0){ await sb.from('orcamentos').eq('polo',polo).in('id',toDelete).delete(); }
    flash(!error);
  }

  async function reloadProducts(){
    const p = await sb.from('products').select('*').eq('polo',polo);
    setProductsLocal((p.data||[]).map(prodFromDB));
  }

  return {products,sales,customers,categories,encomendas,orcamentos,loading,syncStatus,
          setProducts,setSales,setCustomers,setCategories,setEncomendas,setOrcamentos,
          reloadProducts,
          addCustomerLocal: (c)=>setCustomersLocal(prev=>[...prev,c])};
}

// ── Indicador de sync ─────────────────────────────────────────────────────────
function SyncIndicator({status}){
  if(status==='idle') return null;
  const cfg={
    saving:{bg:'#1a4e8e',txt:'Salvando...'},
    saved: {bg:'#1a6e2e',txt:'✓ Salvo'},
    error: {bg:'#cc2222',txt:'⚠ Erro ao salvar'},
  }[status]||{};
  return <div style={{position:'fixed',bottom:60,right:20,background:cfg.bg,color:'#fff',padding:'6px 14px',borderRadius:3,fontFamily:'Oswald,sans-serif',fontSize:11,letterSpacing:2,zIndex:9998,boxShadow:'0 2px 8px rgba(0,0,0,.2)'}}>{cfg.txt}</div>;
}

// ── Tela de loading ───────────────────────────────────────────────────────────
function LoadingScreen({polo}){
  return <div style={{minHeight:'100vh',background:'#0a0a0a',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
    <img src={LOGO} style={{height:80,opacity:.8}} alt=""/>
    <div style={{fontFamily:'Share Tech Mono',fontSize:10,letterSpacing:4,color:'#555',textTransform:'uppercase'}}>
      Carregando polo {polo?.toUpperCase()}...
    </div>
    <div style={{width:120,height:2,background:'#222',borderRadius:1,overflow:'hidden'}}>
      <div style={{height:'100%',background:'#fff',borderRadius:1,animation:'loadbar 1.2s ease-in-out infinite'}}/>
    </div>
    <style>{`@keyframes loadbar{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}`}</style>
  </div>;
}

// ====== ROOT APP ======
function App(){
  const [polo,setPolo]=useState(()=>{ try{return localStorage.getItem('bp_polo')||null;}catch(e){return null;} });
  const [notif,setNotif]=useState(null);
  const [currentUser,setCurrentUser]=useState(()=>{ try{return JSON.parse(localStorage.getItem('bp_user')||'null');}catch(e){return null;} });
  const [operador,setOperador]=useState(()=>{ try{return JSON.parse(localStorage.getItem('bp_operador')||'null');}catch(e){return null;} });
  const [mode,setMode]=useState(()=>{
    try{
      const op=JSON.parse(localStorage.getItem('bp_operador')||'null');
      return (op && localStorage.getItem('bp_mode')==='admin') ? 'admin' : 'store';
    }catch(e){ return 'store'; }
  });

  const poloHook = usePoloData(polo);

  // mantém a sessão ao recarregar a página
  useEffect(()=>{ try{ polo?localStorage.setItem('bp_polo',polo):localStorage.removeItem('bp_polo'); }catch(e){} },[polo]);
  useEffect(()=>{ try{ localStorage.setItem('bp_mode',mode); }catch(e){} },[mode]);
  useEffect(()=>{ try{ currentUser?localStorage.setItem('bp_user',JSON.stringify(currentUser)):localStorage.removeItem('bp_user'); }catch(e){} },[currentUser]);
  useEffect(()=>{ try{ operador?localStorage.setItem('bp_operador',JSON.stringify(operador)):localStorage.removeItem('bp_operador'); }catch(e){} },[operador]);

  function notify(msg,type="success"){setNotif({msg,type,key:Date.now()});}
  function handleLogin(user){setCurrentUser(user);setMode("store");}
  function handleSelectPolo(id){setPolo(id);setMode("store");setCurrentUser(null);}
  function handleOperadorLogin(op){setOperador(op);setMode("admin");}
  function handleLogout(){setOperador(null);setMode("store");}

  if(!polo) return <>
    <PoloSelector onSelect={handleSelectPolo}/>
    {notif&&<Notif key={notif.key} msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
  </>;

  if(poloHook.loading) return <LoadingScreen polo={polo}/>;

  const {products,sales,customers,categories,encomendas,orcamentos,syncStatus,
         setProducts,setSales,setCustomers,setCategories,setEncomendas,setOrcamentos,
         reloadProducts,addCustomerLocal} = poloHook;
  const poloInfo = POLOS[polo];

  return <div>
    {mode==="store"&&<CustomerStore
      polo={poloInfo}
      onTrocarPolo={()=>{setPolo(null);setMode("store");setCurrentUser(null);}}
      products={products} categories={categories} sales={sales}
      setSales={setSales} setProducts={setProducts}
      currentUser={currentUser} setCurrentUser={setCurrentUser}
      customers={customers} setCustomers={setCustomers}
      setEncomendas={setEncomendas}
      onShowAuth={()=>setMode("auth")} notify={notify}/>}
    {mode==="auth"&&<AuthScreen
      polo={polo}
      customers={customers} setCustomers={addCustomerLocal}
      onLogin={handleLogin} onClose={()=>setMode("admin-login")} notify={notify}/>}
    {mode==="admin-login"&&<AdminLogin
      polo={polo}
      onLogin={handleOperadorLogin}
      onBackToStore={()=>setMode("store")} notify={notify}/>}
    {mode==="admin"&&<AdminPanel
      polo={poloInfo}
      operador={operador}
      onTrocarPolo={()=>{setPolo(null);setMode("store");setCurrentUser(null);setOperador(null);}}
      products={products} setProducts={setProducts}
      sales={sales} setSales={setSales}
      customers={customers} setCustomers={setCustomers}
      categories={categories} setCategories={setCategories}
      orcamentos={orcamentos} setOrcamentos={setOrcamentos}
      encomendas={encomendas} setEncomendas={setEncomendas}
      reloadProducts={reloadProducts}
      onLogout={handleLogout} notify={notify}/>}
    <SyncIndicator status={syncStatus}/>
    {notif&&<Notif key={notif.key} msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
  </div>;
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>

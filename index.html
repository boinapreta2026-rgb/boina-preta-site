// ====== RECUPERAÇÃO DE SENHA SEGURA ======
// Verifica: e-mail + CPF + data de nascimento (só para clientes da loja)
// Operadores: recuperação só pelo dono via painel Configurações

function RecuperarSenhaModal({onClose, polo, onSuccess}){
  const [step, setStep]     = useState('verificar'); // 'verificar' | 'nova'
  const [form, setForm]     = useState({email:'', cpf:'', birthdate:''});
  const [clienteId, setClienteId] = useState(null);
  const [novaSenha, setNovaSenha] = useState('');
  const [confirmar, setConfirmar] = useState('');
  const [err,  setErr]      = useState('');
  const [loading, setLoading] = useState(false);

  // Normaliza CPF para comparação (remove pontos e traços)
  function normCPF(v){ return (v||'').replace(/\D/g,''); }
  // Normaliza data: aceita DD/MM/AAAA ou AAAA-MM-DD
  function normData(v){
    if(!v) return '';
    v = v.trim();
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(v)){
      const [d,m,a] = v.split('/');
      return `${a}-${m}-${d}`;
    }
    return v; // já no formato ISO
  }

  async function verificarIdentidade(){
    setErr('');
    if(!form.email||!form.cpf||!form.birthdate){
      setErr('Preencha todos os campos.');return;
    }
    setLoading(true);
    try{
      const {data} = await sb.from('customers')
        .select('id,cpf,birthdate,name')
        .eq('polo',polo)
        .eq('email',form.email)
        .single();

      if(!data){
        // Mensagem genérica — não revela se e-mail existe ou não
        setErr('Dados não conferem. Verifique e tente novamente.');
        setLoading(false);return;
      }

      const cpfOk       = normCPF(data.cpf) === normCPF(form.cpf);
      const nascOk      = normData(data.birthdate) === normData(form.birthdate);

      if(!cpfOk || !nascOk){
        setErr('Dados não conferem. Verifique e tente novamente.');
        setLoading(false);return;
      }

      setClienteId(data.id);
      setStep('nova');
    } catch(e){
      setErr('Dados não conferem. Verifique e tente novamente.');
    }
    setLoading(false);
  }

  async function salvarNovaSenha(){
    setErr('');
    if(novaSenha.length < 4){ setErr('A senha deve ter pelo menos 4 caracteres.'); return; }
    if(novaSenha !== confirmar){ setErr('As senhas não coincidem.'); return; }
    if(!clienteId){ setErr('Sessão inválida. Comece novamente.'); return; }
    setLoading(true);
    try{
      const {error} = await sb.from('customers').eq('id', clienteId).update({password: novaSenha});
      if(error){ setErr('Erro ao salvar. Tente novamente.'); setLoading(false); return; }
      onSuccess && onSuccess();
      onClose();
    } catch(e){ setErr('Erro ao salvar. Tente novamente.'); }
    setLoading(false);
  }

  // Máscara simples de CPF
  function mascaraCPF(v){
    return v.replace(/\D/g,'').slice(0,11)
      .replace(/(\d{3})(\d)/,'$1.$2')
      .replace(/(\d{3})(\d)/,'$1.$2')
      .replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  }
  function mascaraData(v){
    return v.replace(/\D/g,'').slice(0,8)
      .replace(/(\d{2})(\d)/,'$1/$2')
      .replace(/(\d{2})(\d)/,'$1/$2');
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-title">
          {step==='verificar'?'Recuperar Senha':'Nova Senha'}
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {err&&<div style={{background:'rgba(204,34,34,.08)',border:'1px solid rgba(204,34,34,.2)',borderRadius:3,padding:'9px 12px',fontSize:12,color:'var(--danger)',marginBottom:14}}>{err}</div>}

        {step==='verificar'&&<>
          <div style={{background:'#f0f7ff',border:'1px solid #b8d4f0',borderRadius:4,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#1a4e8e'}}>
            Para sua segurança, confirme os dados cadastrados. Todos os três campos precisam conferir exatamente.
          </div>
          <div className="form-group mb-3">
            <label>E-mail cadastrado *</label>
            <input type="email" placeholder="seu@email.com"
              value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          </div>
          <div className="form-group mb-3">
            <label>CPF *</label>
            <input placeholder="000.000.000-00"
              value={form.cpf}
              onChange={e=>setForm({...form,cpf:mascaraCPF(e.target.value)})}/>
          </div>
          <div className="form-group mb-4">
            <label>Data de Nascimento *</label>
            <input placeholder="DD/MM/AAAA"
              value={form.birthdate}
              onChange={e=>setForm({...form,birthdate:mascaraData(e.target.value)})}/>
          </div>
          <div className="modal-actions">
            <button className="btn" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={verificarIdentidade} disabled={loading}>
              {loading?'Verificando...':'Verificar Identidade →'}
            </button>
          </div>
          <div style={{marginTop:14,padding:'10px 12px',background:'#f9f9f9',borderRadius:4,fontSize:11,color:'#888',lineHeight:1.6}}>
            Não lembra os dados? Entre em contato com a loja para que um atendente redefina sua senha.
          </div>
        </>}

        {step==='nova'&&<>
          <div style={{background:'#e8f5e9',border:'1px solid #a5d6a7',borderRadius:4,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#1a6e2e'}}>
            ✓ Identidade confirmada. Defina sua nova senha.
          </div>
          <div className="form-group mb-3">
            <label>Nova Senha *</label>
            <input type="password" placeholder="Mínimo 4 caracteres"
              value={novaSenha} onChange={e=>setNovaSenha(e.target.value)}/>
          </div>
          <div className="form-group mb-4">
            <label>Confirmar Nova Senha *</label>
            <input type="password" placeholder="Repita a senha"
              value={confirmar} onChange={e=>setConfirmar(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&salvarNovaSenha()}/>
          </div>
          <div className="modal-actions">
            <button className="btn" onClick={()=>{setStep('verificar');setErr('');}}>← Voltar</button>
            <button className="btn btn-primary" onClick={salvarNovaSenha} disabled={loading}>
              {loading?'Salvando...':'✓ Salvar Nova Senha'}
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}

function AuthScreen({customers,setCustomers,onLogin,onClose,notify,polo}){
  const [tab,setTab]=useState("login"),[form,setForm]=useState({}),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
  const [recovModal,setRecovModal]=useState(false);

  async function login(){
    setLoading(true);setErr("");
    try{
      // busca sempre do banco para garantir dados atualizados
      const {data}=await sb.from('customers').select('*').eq('polo',polo).eq('email',form.email).single();
      if(data && data.password===form.password){
        const u=custFromDB(data);
        onLogin(u);notify("Bem-vindo(a), "+u.name.split(" ")[0]+"!","success");
      } else {
        setErr("E-mail ou senha incorretos.");
      }
    } catch(e){ setErr("E-mail ou senha incorretos."); }
    setLoading(false);
  }

  async function register(){
    if(!form.name||!form.email||!form.phone||!form.password||!form.cpf||!form.birthdate){
      setErr("Preencha todos os campos obrigatórios, incluindo CPF e data de nascimento.");return;
    }
    setLoading(true);setErr("");
    try{
      const {data:exist}=await sb.from('customers').select('id').eq('polo',polo).eq('email',form.email);
      if(exist&&exist.length>0){setErr("E-mail já cadastrado.");setLoading(false);return;}
      const newUser={
        id:String(Date.now()),name:form.name,email:form.email,phone:form.phone,
        password:form.password,school:form.school||"",grade:form.grade||"",
        cpf:form.cpf||"",birthdate:form.birthdate||"",
        enrollment:"",rg:"",address:"",neighborhood:"",
        city:"",state:"",cep:"",parentName:"",parentPhone:"",parentEmail:"",
        parentCpf:"",totalPurchases:0,createdAt:new Date().toLocaleDateString("pt-BR")
      };
      const {error}=await sb.from('customers').insert(custToDB(newUser,polo));
      if(error){setErr("Erro ao cadastrar: "+error.message);setLoading(false);return;}
      setCustomers(newUser);
      onLogin(newUser);
      notify("Cadastro realizado! Bem-vindo(a)!","success");
    } catch(e){ setErr("Erro ao cadastrar. Tente novamente."); }
    setLoading(false);
  }
  return <div className="auth-screen">
    <div className="auth-box">
      <div className="auth-logo"><img src={LOGO} alt="Boina Preta"/></div>
      <div className="auth-title">Minha Conta</div>
      <div className="auth-sub">Acesse ou crie sua conta para comprar</div>
      <div className="auth-tabs">
        <div className={`auth-tab ${tab==="login"?"active":""}`} onClick={()=>{setTab("login");setErr("");}}>Entrar</div>
        <div className={`auth-tab ${tab==="register"?"active":""}`} onClick={()=>{setTab("register");setErr("");}}>Cadastrar</div>
      </div>
      {err&&<div style={{background:"rgba(204,34,34,.08)",border:"1px solid rgba(204,34,34,.2)",borderRadius:3,padding:"9px 12px",fontSize:12,color:"var(--danger)",marginBottom:12,fontFamily:"Barlow",letterSpacing:.5}}>{err}</div>}
      {tab==="login"?<div>
        <div className="form-group mb-2"><label>E-mail</label><input type="email" placeholder="seu@email.com" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})}/></div>
        <div className="form-group mb-3"><label>Senha</label><input type="password" placeholder="••••••" value={form.password||""} onChange={e=>setForm({...form,password:e.target.value})} onKeyDown={e=>e.key==="Enter"&&login()}/></div>
        <button className="btn btn-primary w-full" style={{justifyContent:"center",padding:"11px"}} onClick={login} disabled={loading}>{loading?"Entrando...":"Entrar →"}</button>
        <div style={{textAlign:"center",marginTop:10}}>
          <span onClick={()=>setRecovModal(true)} style={{fontFamily:"Share Tech Mono",fontSize:9,letterSpacing:1,color:"#aaa",cursor:"pointer",textDecoration:"underline",textTransform:"uppercase"}}>Esqueci minha senha</span>
        </div>
      </div>:<div>
        <div style={{background:'#fff8e8',border:'1px solid #e6c800',borderRadius:3,padding:'8px 12px',fontSize:11,color:'#7a5500',marginBottom:12}}>
          ⚠ CPF e data de nascimento são obrigatórios para recuperação de senha.
        </div>
        <div className="form-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div className="form-group full"><label>Nome Completo *</label><input placeholder="Seu nome completo" value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          <div className="form-group full"><label>E-mail *</label><input type="email" placeholder="seu@email.com" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})}/></div>
          <div className="form-group"><label>CPF *</label><input placeholder="000.000.000-00" value={form.cpf||""} onChange={e=>setForm({...form,cpf:e.target.value.replace(/\D/g,'').slice(0,11).replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2')})}/></div>
          <div className="form-group"><label>Data de Nascimento *</label><input placeholder="DD/MM/AAAA" value={form.birthdate||""} onChange={e=>setForm({...form,birthdate:e.target.value.replace(/\D/g,'').slice(0,8).replace(/(\d{2})(\d)/,'$1/$2').replace(/(\d{2})(\d)/,'$1/$2')})}/></div>
          <div className="form-group"><label>Telefone *</label><input placeholder="(00) 00000-0000" value={form.phone||""} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
          <div className="form-group"><label>Escola</label><input placeholder="Nome da escola" value={form.school||""} onChange={e=>setForm({...form,school:e.target.value})}/></div>
          <div className="form-group full"><label>Senha *</label><input type="password" placeholder="Crie uma senha" value={form.password||""} onChange={e=>setForm({...form,password:e.target.value})}/></div>

        <button className="btn btn-primary w-full" style={{justifyContent:"center",padding:"11px",marginTop:16}} onClick={register} disabled={loading}>{loading?"Cadastrando...":"Criar Conta →"}</button>
      </div>}
      <div className="admin-link">Administrador? <span onClick={onClose}>Acessar painel admin</span></div>
    </div>
    {recovModal&&<RecuperarSenhaModal polo={polo} onClose={()=>setRecovModal(false)} onSuccess={()=>notify('Senha alterada! Faça login com a nova senha.','success')}/>}
  </div>;
}

// ====== ADMIN LOGIN (operadores) ======
function AdminLogin({onLogin, onBackToStore, notify, polo}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [recovModal,setRecovModal]=useState(false);

  async function login(){
    if(!email||!pass){setErr('Preencha e-mail e senha.');return;}
    setLoading(true);setErr('');
    try{
      // busca operador no Supabase
      const {data}=await sb.from('operadores').select('*').eq('email',email).eq('ativo',true);
      const op = (data||[]).find(o=>o.password===pass && (o.polo===polo||o.polo==='ambos'));
      if(!op){setErr('E-mail, senha incorretos ou sem acesso a este polo.');setLoading(false);return;}
      onLogin({id:op.id,nome:op.nome,email:op.email,role:op.role,polo:op.polo});
      notify(`Bem-vindo(a), ${op.nome.split(' ')[0]}!`,'success');
    } catch(e){setErr('Erro ao conectar. Verifique sua conexão.');}
    setLoading(false);
  }

  return <div className="auth-screen">
    <div className="auth-box">
      <div className="auth-logo"><img src={LOGO} alt="Boina Preta"/></div>
      <div className="auth-title">Painel Admin</div>

      {err&&<div style={{background:"rgba(204,34,34,.08)",border:"1px solid rgba(204,34,34,.2)",borderRadius:3,padding:"9px 12px",fontSize:12,color:"var(--danger)",marginBottom:12}}>{err}</div>}
      <div className="form-group mb-2"><label>E-mail</label><input type="email" placeholder="seu@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/></div>
      <div className="form-group mb-3"><label>Senha</label><input type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/></div>
      <button className="btn btn-primary w-full" style={{justifyContent:'center',padding:'11px'}} onClick={login} disabled={loading}>{loading?'Entrando...':'Acessar Painel →'}</button>
      <div style={{textAlign:'center',marginTop:10,fontSize:11,color:'#aaa',fontFamily:'Share Tech Mono',letterSpacing:1,lineHeight:1.6}}>
        Esqueceu a senha?<br/>Solicite ao dono da loja para redefinir.
      </div>
      <div className="admin-link"><span onClick={onBackToStore}>← Voltar à loja</span></div>
    </div>
  </div>;
}

// ====== CONFIGURAÇÕES (só dono) ======
function Configuracoes({polo, notify}){
  const [ops,setOps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [err,setErr]=useState('');

  useEffect(()=>{
    (async()=>{
      const {data}=await sb.from('operadores').select('*').order('created_at',{ascending:true});
      setOps(data||[]);setLoading(false);
    })();
  },[]);

  async function save(){
    setErr('');
    if(!form.nome||!form.email||!form.password){setErr('Preencha nome, e-mail e senha.');return;}
    // checar email duplicado
    if(!form.id){
      const dup=(ops||[]).find(o=>o.email===form.email);
      if(dup){setErr('Este e-mail já está cadastrado.');return;}
    }
    const row={
      id: form.id||String(Date.now()),
      polo: form.polo||polo,
      nome: form.nome,
      email: form.email,
      password: form.password,
      role: form.role||'vendedor',
      ativo: form.ativo!==false
    };
    const {error}=await sb.from('operadores').upsert(row);
    if(error){setErr('Erro ao salvar: '+error.message);return;}
    setOps(prev=>prev.find(o=>o.id===row.id)?prev.map(o=>o.id===row.id?row:o):[...prev,row]);
    notify(form.id?'Operador atualizado!':'Operador criado!','success');
    setModal(false);
  }

  async function toggleAtivo(op){
    const upd={...op,ativo:!op.ativo};
    await sb.from('operadores').upsert(upd);
    setOps(prev=>prev.map(o=>o.id===op.id?upd:o));
    notify(upd.ativo?`${op.nome} reativado`:`${op.nome} desativado`,'success');
  }

  async function del(op){
    if(!confirm(`Excluir operador "${op.nome}"? Esta ação não pode ser desfeita.`)) return;
    await sb.from('operadores').eq('id',op.id).delete();
    setOps(prev=>prev.filter(o=>o.id!==op.id));
    notify('Operador removido','success');
  }

  const roleLabel={dono:'👑 Administrador',gerente:'🧑‍💼 Gerente',vendedor:'🙋 Vendedor'};
  const poloLabel = Object.fromEntries(
    [...Object.values(POLOS).map(p=>[p.id, p.sigla+' — '+p.nome.split(' ').slice(0,3).join(' ')]),
     ['ambos','Todos os Polos']]
  );

  return <div>
    <div className="flex justify-between items-center mb-4">
      <div>
        <div style={{fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:2,color:'#aaa',textTransform:'uppercase',marginBottom:4}}>Gerencie os acessos da equipe</div>
      </div>
      <button className="btn btn-primary" onClick={()=>{setForm({role:'vendedor',polo,ativo:true});setErr('');setModal(true);}}>+ Novo Operador</button>
    </div>

    {loading ? <div style={{textAlign:'center',padding:40,color:'#aaa',fontFamily:'Share Tech Mono',fontSize:10,letterSpacing:2}}>Carregando...</div> : (
    <div className="card">
      <div className="table-wrap">
        <table>
          <thead><tr>{['Nome','E-mail','Perfil','Polo','Status','Ações'].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {!ops.length&&<tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'#bbb'}}>Nenhum operador cadastrado</td></tr>}
            {ops.map(op=>(
              <tr key={op.id} style={{opacity:op.ativo?1:.5}}>
                <td><strong>{op.nome}</strong></td>
                <td className="text-mono" style={{fontSize:11}}>{op.email}</td>
                <td><span className={`tag ${op.role==='dono'?'tag-done':op.role==='gerente'?'tag-integra':'tag-online'}`}>{roleLabel[op.role]||op.role}</span></td>
                <td className="text-mono" style={{fontSize:10}}>{poloLabel[op.polo]||op.polo}</td>
                <td><span className={`tag ${op.ativo?'tag-ok':'tag-out'}`}>{op.ativo?'ATIVO':'INATIVO'}</span></td>
                <td>
                  <div className="flex gap-2">
                    <button className="btn btn-sm" onClick={()=>{setForm({...op});setErr('');setModal(true);}}>✏</button>
                    <button className="btn btn-sm" onClick={()=>toggleAtivo(op)} title={op.ativo?'Desativar':'Reativar'}>
                      {op.ativo?'⏸':'▶'}
                    </button>
                    {op.role!=='dono'&&<button className="btn btn-sm btn-danger" onClick={()=>del(op)}>🗑</button>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
    )}

    {/* Info de permissões */}
    <div className="card" style={{marginTop:16}}>
      <div className="card-title">Permissões por perfil</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16}}>
        {[
          {role:'dono',   perms:['Dashboard','Frente de Caixa','Estoque (consulta)','Gestão de Estoque','Relatório de Vendas','Fechamento de Caixa','Clientes','Orçamentos','Encomendas','Pedidos Online','Usuários & Acessos'], nega:[]},
          {role:'gerente',perms:['Dashboard','Frente de Caixa','Estoque (consulta)','Gestão de Estoque','Relatório de Vendas','Fechamento de Caixa','Clientes','Orçamentos','Encomendas','Pedidos Online'], nega:['Usuários & Acessos']},
          {role:'vendedor',perms:['Dashboard','Frente de Caixa','Estoque (somente consulta)','Relatório de Vendas','Fechamento de Caixa','Clientes','Orçamentos','Encomendas','Pedidos Online'], nega:['Gestão de Estoque','Alterar estoque','Usuários & Acessos']},
        ].map(({role:r,perms,nega})=>(
          <div key={r}>
            <div style={{fontFamily:'Oswald',fontSize:12,fontWeight:600,letterSpacing:2,textTransform:'uppercase',marginBottom:10,color:roleMeta(r).color}}>{roleMeta(r).icon} {roleMeta(r).label}</div>
            {perms.map(p=>(
              <div key={p} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',fontSize:12,color:'#444'}}>
                <span style={{color:'#1a6e2e',fontSize:10}}>✓</span>{p}
              </div>
            ))}
            {nega.map(p=>(
              <div key={p} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',fontSize:12,color:'#bbb'}}>
                <span style={{color:'#cc2222',fontSize:10}}>✕</span>{p}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>

    {modal&&<Modal title={form.id?'Editar Operador':'Novo Operador'} onClose={()=>setModal(false)}
      actions={[
        <button key="c" className="btn" onClick={()=>setModal(false)}>Cancelar</button>,
        <button key="s" className="btn btn-primary" onClick={save}>Salvar</button>
      ]}>
      {err&&<div style={{background:'rgba(204,34,34,.08)',border:'1px solid rgba(204,34,34,.2)',borderRadius:3,padding:'9px 12px',fontSize:12,color:'var(--danger)',marginBottom:14}}>{err}</div>}
      <div className="form-grid">
        <div className="form-group"><label>Nome Completo *</label><input placeholder="Nome do operador" value={form.nome||''} onChange={e=>setForm({...form,nome:e.target.value})}/></div>
        <div className="form-group"><label>E-mail *</label><input type="email" placeholder="email@exemplo.com" value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></div>
        <div className="form-group"><label>Senha *</label><input type="password" placeholder="Senha de acesso" value={form.password||''} onChange={e=>setForm({...form,password:e.target.value})}/></div>
        <div className="form-group"><label>Perfil</label>
          <select value={form.role||'vendedor'} onChange={e=>setForm({...form,role:e.target.value})}>
            <option value="vendedor">🙋 Vendedor</option>
            <option value="gerente">🧑‍💼 Gerente</option>
            <option value="dono">👑 Administrador</option>
          </select>
        </div>
        <div className="form-group"><label>Polo de Acesso</label>
          <select value={form.polo||polo} onChange={e=>setForm({...form,polo:e.target.value})}>
            {Object.values(POLOS).map(p=><option key={p.id} value={p.id}>{p.sigla} — {p.nome}</option>)}
            <option value="ambos">Todos os Polos</option>
          </select>
        </div>
        <div className="form-group"><label>Status</label>
          <select value={form.ativo===false?'false':'true'} onChange={e=>setForm({...form,ativo:e.target.value==='true'})}>
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>
      </div>
    </Modal>}
  </div>;
}

const ORC_STATUS = ["Rascunho","Aguardando Aprovação","Aprovado","Recusado","Convertido em Venda"];
const ORC_STATUS_COLORS = {
  "Rascunho":"tag-pending",
  "Aguardando Aprovação":"tag-online",
  "Aprovado":"tag-done",
  "Recusado":"tag-out",
  "Convertido em Venda":"tag-integra"
};

function OrcamentoModal({orc, products, customers, onClose, onSave, onConvert, notify}){
  const [form, setForm] = useState(orc ? {...orc} : {
    numero: 'ORC-' + String(Date.now()).slice(-6),
    cliente: '', clienteEmail: '', clientePhone: '', escola: '',
    status: 'Rascunho', validade: '', obs: '',
    items: [], desconto: 0, createdAt: new Date().toLocaleDateString('pt-BR')
  });
  const [addProd, setAddProd] = useState('');
  const [addQty, setAddQty] = useState(1);

  const subtotal = form.items.reduce((a,b) => a + b.price * b.qty, 0);
  const descVal = form.desconto > 0 ? subtotal * (form.desconto / 100) : 0;
  const total = subtotal - descVal;

  function addItem(){
    if(!addProd) return;
    const p = products.find(x => String(x.id) === String(addProd));
    if(!p){ notify && notify('Produto não encontrado','error'); return; }
    const stock = p.stock||0;
    if(stock<=0){ notify && notify(`${p.name} está sem estoque neste polo`,'error'); return; }
    const ex = form.items.find(x => String(x.productId) === String(p.id));
    const jaNoOrc = ex ? ex.qty : 0;
    const disponivel = stock - jaNoOrc;
    if(disponivel<=0){ notify && notify(`Estoque máximo de ${p.name} (${stock} un.) já está no orçamento`,'error'); return; }
    let q = Math.max(1, parseInt(addQty)||1);
    if(q>disponivel){ notify && notify(`Apenas ${disponivel} un. de ${p.name} disponível(is) neste polo. Ajustado.`,'error'); q=disponivel; }
    if(ex){
      setForm({...form, items: form.items.map(x => String(x.productId) === String(p.id) ? {...x, qty: x.qty + q, maxStock:stock} : x)});
    } else {
      setForm({...form, items: [...form.items, {productId:p.id, name:p.name, price:p.price, qty:q, sku:p.sku, maxStock:stock}]});
    }
    setAddProd(''); setAddQty(1);
  }

  function removeItem(pid){ setForm({...form, items: form.items.filter(x => String(x.productId) !== String(pid))}); }
  function updateItemQty(pid, q){
    if(q <= 0){ removeItem(pid); return; }
    const p = products.find(x => String(x.id) === String(pid));
    const stock = p ? (p.stock||0) : Infinity;
    if(q > stock){ notify && notify(`Apenas ${stock} un. em estoque neste polo`,'error'); q = stock; }
    setForm({...form, items: form.items.map(x => String(x.productId) === String(pid) ? {...x, qty: q, maxStock:(p?stock:x.maxStock)} : x)});
  }

  function printPDF(){
    const win = window.open('', '_blank');
    const rows = form.items.map(i =>
      `<tr><td>${i.sku}</td><td>${i.name}</td><td>${i.qty}</td><td>R$${i.price.toFixed(2)}</td><td>R$${(i.price*i.qty).toFixed(2)}</td></tr>`
    ).join('');
    win.document.write(`<html><head><title>Orçamento ${form.numero}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:40px;color:#111;max-width:800px;margin:0 auto}
      .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:3px solid #111}
      .logo-area h1{font-size:32px;font-weight:900;letter-spacing:4px;margin:0}
      .logo-area p{font-size:11px;letter-spacing:3px;color:#666;margin:4px 0 0}
      .orc-num{text-align:right}
      .orc-num h2{font-size:20px;font-weight:700;margin:0}
      .orc-num p{font-size:12px;color:#666;margin:4px 0 0}
      .section{margin-bottom:20px}
      .section h3{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee;padding-bottom:6px;margin-bottom:10px}
      .client-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      .client-field label{font-size:10px;color:#aaa;display:block;margin-bottom:2px}
      .client-field span{font-size:13px;font-weight:500}
      table{width:100%;border-collapse:collapse;margin-top:8px}
      th{background:#111;color:#fff;padding:9px 10px;text-align:left;font-size:11px;letter-spacing:1px}
      td{padding:9px 10px;border-bottom:1px solid #f0f0f0;font-size:12px}
      tr:nth-child(even) td{background:#fafafa}
      .totals{margin-top:16px;text-align:right}
      .totals p{margin:4px 0;font-size:13px}
      .totals .grand{font-size:20px;font-weight:700;margin-top:8px}
      .obs-box{background:#f9f9f9;border:1px solid #eee;border-radius:4px;padding:14px;font-size:12px;color:#555;margin-top:8px}
      .validade{background:#fff8e6;border:1px solid #f0d060;border-radius:4px;padding:10px 14px;font-size:12px;color:#775500;display:inline-block;margin-top:12px}
      .footer{margin-top:40px;padding-top:16px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#aaa;letter-spacing:2px}
      .status-badge{display:inline-block;padding:4px 12px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:${form.status==='Aprovado'?'#d4edda':form.status==='Recusado'?'#f8d7da':'#fff3cd'};color:${form.status==='Aprovado'?'#155724':form.status==='Recusado'?'#721c24':'#856404'}}

    <body>
      <div class="header">

        <div class="orc-num">
          <h2>ORÇAMENTO</h2>
          <p><strong>${form.numero}</strong></p>

        </div>

          <div class="client-field"><label>Nome</label><span>${form.cliente || '—'}</span></div>
          <div class="client-field"><label>Escola</label><span>${form.escola || '—'}</span></div>
          <div class="client-field"><label>E-mail</label><span>${form.clienteEmail || '—'}</span></div>
          <div class="client-field"><label>Telefone</label><span>${form.clientePhone || '—'}</span></div>
        </div>
      </div>
      <div class="section">
        <h3>Itens do Orçamento</h3>
        <table>
          <thead><tr><th>SKU</th><th>Produto</th><th>Qtd</th><th>Unitário</th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="totals">
        <p>Subtotal: R$${subtotal.toFixed(2)}</p>
        ${descVal > 0 ? `<p>Desconto (${form.desconto}%): <span style="color:#cc2222">– R$${descVal.toFixed(2)}</span></p>` : ''}
        <p class="grand">Total: R$${total.toFixed(2)}</p>
      </div>
      ${form.obs ? `<div class="section" style="margin-top:20px"><h3>Observações</h3><div class="obs-box">${form.obs}</div></div>` : ''}
      ${form.validade ? `<div class="validade">⏳ Este orçamento é válido até ${form.validade}</div>` : ''}
      <div class="footer">BOINA PRETA LTDA · SHOPPING TÁTICO MILITAR · @boina.preta</div>
    </body></html>`);
    win.print();
    notify('PDF gerado!', 'success');
  }

    );

  return (

                  <tr key={item.productId}>

                    <td className="text-mono" style={{fontSize:9,color:'#aaa'}}>{item.sku}</td>
                    <td>
                      <div className="qty-row">
                        <button className="qty-btn" onClick={()=>updateItemQty(item.productId, item.qty-1)}>−</button>
                        <span className="qty-n">{item.qty}</span>
                        <button className="qty-btn" onClick={()=>updateItemQty(item.productId, item.qty+1)}>+</button>
                      </div>
                    </td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{fmt(item.price)}</td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{fmt(item.price*item.qty)}</td>
                    <td><button className="btn btn-sm btn-danger" onClick={()=>removeItem(item.productId)}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
          {form.items.length === 0 && <div style={{textAlign:'center',padding:'16px',color:'#bbb',fontFamily:'Share Tech Mono',fontSize:11,letterSpacing:2,border:'1px dashed #ddd',borderRadius:3}}>NENHUM ITEM ADICIONADO</div>}
        </div>
        <div className="form-group"><label>Desconto (%)</label><input type="number" min="0" max="100" value={form.desconto} onChange={e=>setForm({...form,desconto:parseFloat(e.target.value)||0})} placeholder="0"/></div>
        <div className="form-group full"><label>Observações</label><textarea value={form.obs} onChange={e=>setForm({...form,obs:e.target.value})} placeholder="Condições de pagamento, prazo de entrega, informações adicionais..."/></div>
      </div>
      {form.items.length > 0 && (
        <div style={{background:'#f9f9f9',border:'1px solid #e8e8e8',borderRadius:4,padding:'14px 18px',marginTop:12,display:'flex',justifyContent:'flex-end',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <div style={{fontFamily:'Share Tech Mono',fontSize:10,color:'#aaa'}}>Subtotal: {fmt(subtotal)}</div>
          {descVal > 0 && <div style={{fontFamily:'Share Tech Mono',fontSize:10,color:'#cc2222'}}>Desconto ({form.desconto}%): – {fmt(descVal)}</div>}
          <div style={{fontFamily:'Bebas Neue',fontSize:24,letterSpacing:2}}>Total: {fmt(total)}</div>
        </div>
      )}
    </Modal>
  );
}

function Orcamentos({products, customers, orcamentos, setOrcamentos, setSales, setProducts, notify}){
  const [modal, setModal] = useState(null);
  const [editOrc, setEditOrc] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('Todos');
  const [convertModal, setConvertModal] = useState(null);
  const [convertPayment, setConvertPayment] = useState('Dinheiro');

  const filtered = orcamentos.filter(o =>
    (statusFilter === 'Todos' || o.status === statusFilter) &&
    (o.numero.toLowerCase().includes(search.toLowerCase()) ||
     o.cliente.toLowerCase().includes(search.toLowerCase()))
  );

  function saveOrc(form){
    if(!form.cliente){ notify('Informe o cliente','error'); return; }
    if(editOrc){
      setOrcamentos(prev => prev.map(o => o.id === form.id ? {...form} : o));
      notify('Orçamento atualizado!','success');
    } else {
      setOrcamentos(prev => [...prev, {...form, id: Date.now()}]);
      notify('Orçamento criado!','success');
    }
    setModal(null); setEditOrc(null);
  }

  function convertToSale(orc){
    if(orc.status === 'Convertido em Venda'){ notify('Já convertido em venda','error'); return; }
    setConvertModal(orc);
  }

  function confirmConvert(){
    const orc = convertModal;
    const now = new Date();
    const date = now.toLocaleDateString('pt-BR');
    const subtotal = orc.items.reduce((a,b) => a + b.price * b.qty, 0);
    const descVal = orc.desconto > 0 ? subtotal * (orc.desconto/100) : 0;
    const total = subtotal - descVal;

    const newSales = orc.items.map(item => ({
      id: Date.now() + Math.random(),
      productId: item.productId, productName: item.name, qty: item.qty,
      unitPrice: item.price,
      total: parseFloat((item.price * item.qty).toFixed(2)),
      cost: 0,
      month: now.getMonth(), week: getWeekNum(now),
      date, ts: now.getTime(),
      payment: convertPayment, type: 'loja', status: 'Concluído',
      customer: orc.cliente,
    }));
    setSales(prev => [...prev, ...newSales]);
    setProducts(prev => prev.map(p => {
      const item = orc.items.find(x => x.productId === p.id);
      return item ? {...p, stock: Math.max(0, p.stock - item.qty)} : p;
    }));
    // registra movimentação
    orc.items.forEach(item=>{
      const p=products.find(x=>x.id===item.productId);
      if(p) registrarMov(p.polo||'',p,'saida_orcamento',p.stock,-item.qty,orc.numero,orc.cliente,'Admin');
    });
    setOrcamentos(prev => prev.map(o => o.id === orc.id ? {...o, status:'Convertido em Venda'} : o));
    setConvertModal(null);
    notify(`Orçamento ${orc.numero} convertido em venda!`, 'success');
  }

  function deleteOrc(id){ if(confirm('Excluir orçamento?')){ setOrcamentos(prev=>prev.filter(o=>o.id!==id)); notify('Excluído','success'); } }

  const stats = {
    total: orcamentos.length,
    aprovados: orcamentos.filter(o=>o.status==='Aprovado').length,
    pendentes: orcamentos.filter(o=>o.status==='Aguardando Aprovação').length,
    convertidos: orcamentos.filter(o=>o.status==='Convertido em Venda').length,
    valorTotal: orcamentos.reduce((a,o)=>{ const s=o.items.reduce((x,i)=>x+i.price*i.qty,0); return a+s*(1-(o.desconto||0)/100); }, 0),
  };

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon">📋</div><div className="stat-label">Total de Orçamentos</div><div className="stat-value">{stats.total}</div></div>
        <div className="stat-card gold"><div className="stat-icon">⏳</div><div className="stat-label">Aguardando Aprovação</div><div className="stat-value">{stats.pendentes}</div></div>
        <div className="stat-card green"><div className="stat-icon">✅</div><div className="stat-label">Aprovados</div><div className="stat-value">{stats.aprovados}</div></div>
        <div className="stat-card blue"><div className="stat-icon">💰</div><div className="stat-label">Convertidos em Venda</div><div className="stat-value">{stats.convertidos}</div></div>
      </div>

      <div className="flex justify-between items-center mb-3" style={{flexWrap:'wrap',gap:8}}>
        <div className="flex gap-2" style={{flexWrap:'wrap'}}>
          {['Todos',...ORC_STATUS].map(s=>(
            <button key={s} className={`btn btn-sm ${statusFilter===s?'btn-primary':''}`} onClick={()=>setStatusFilter(s)}>
              {s}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditOrc(null);setModal('new');}}>+ Novo Orçamento</button>
      </div>

      <div className="card">
        <div className="search-box"><span className="search-icon">🔍</span><input placeholder="Buscar por número ou cliente..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="table-wrap">
          <table>
            <thead><tr>{['Número','Cliente','Escola','Itens','Subtotal','Desconto','Total','Validade','Status','Ações'].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>
              {!filtered.length && <tr><td colSpan={10} style={{textAlign:'center',padding:28,color:'#bbb'}}>Nenhum orçamento encontrado</td></tr>}
              {filtered.map(o => {
                const sub = o.items.reduce((a,b)=>a+b.price*b.qty,0);
                const disc = o.desconto>0 ? sub*(o.desconto/100) : 0;
                const tot = sub - disc;
                return (
                  <tr key={o.id}>
                    <td><strong className="text-mono" style={{fontSize:12}}>{o.numero}</strong></td>
                    <td><strong>{o.cliente}</strong></td>
                    <td style={{fontSize:12}}>{o.escola||'—'}</td>
                    <td className="text-mono" style={{fontSize:11}}>{o.items.length} {o.items.length===1?'item':'itens'}</td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{fmt(sub)}</td>
                    <td>{o.desconto>0?<span className="tag tag-out">{o.desconto}%</span>:<span style={{color:'#bbb',fontSize:11}}>—</span>}</td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:15,letterSpacing:1}}>{fmt(tot)}</td>
                    <td className="text-mono" style={{fontSize:10,color: o.validade?'#111':'#bbb'}}>{o.validade||'—'}</td>
                    <td><span className={`tag ${ORC_STATUS_COLORS[o.status]||'tag-pending'}`}>{o.status}</span></td>
                    <td>
                      <div className="flex gap-2">
                        <button className="btn btn-sm" title="Editar" onClick={()=>{setEditOrc(o);setModal('edit');}}>✏</button>
                        {o.status !== 'Convertido em Venda' && (
                          <button className="btn btn-sm" title="Converter em venda" style={{color:'#1a6e2e',borderColor:'#1a6e2e'}} onClick={()=>convertToSale(o)}>💰</button>
                        )}
                        <button className="btn btn-sm btn-danger" title="Excluir" onClick={()=>deleteOrc(o.id)}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {modal && (
        <OrcamentoModal
          orc={editOrc}
          products={products}
          customers={customers}
          onClose={()=>{setModal(null);setEditOrc(null);}}
          onSave={saveOrc}
          notify={notify}
        />
      )}

      {convertModal && (
        <Modal title={`Converter em Venda — ${convertModal.numero}`} onClose={()=>setConvertModal(null)}
          actions={[
            <button key="c" className="btn" onClick={()=>setConvertModal(null)}>Cancelar</button>,
            <button key="ok" className="btn btn-success" onClick={confirmConvert}>✓ Confirmar Venda</button>
          ]}>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:'Oswald',fontSize:13,fontWeight:600,letterSpacing:2,textTransform:'uppercase',color:'#666',marginBottom:10}}>Resumo do Pedido</div>
            {convertModal.items.map(item=>(
              <div key={item.productId} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f5f5f5',fontSize:13}}>
                <span>{item.name} <span className="text-mono" style={{fontSize:10,color:'#aaa'}}>x{item.qty}</span></span>
                <span style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{fmt(item.price*item.qty)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0 0',fontFamily:'Bebas Neue',fontSize:20,letterSpacing:2}}>
              <span>Total</span>
              <span>{fmt(convertModal.items.reduce((a,b)=>a+b.price*b.qty,0) * (1-(convertModal.desconto||0)/100))}</span>
            </div>
          </div>
          <div className="form-group">
            <label>Forma de Pagamento</label>
            <select value={convertPayment} onChange={e=>setConvertPayment(e.target.value)}>
              {PMTS.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div style={{background:'rgba(26,110,46,.06)',border:'1px solid rgba(26,110,46,.2)',borderRadius:3,padding:'10px 14px',marginTop:12,fontSize:12,color:'#1a6e2e'}}>
            ✅ Esta ação irá registrar a venda no sistema, baixar o estoque e marcar o orçamento como "Convertido em Venda".
          </div>
        </Modal>
      )}
    </div>
  );
}

const ENC_STATUS_CLS = {
  "Novo Pedido":"tag-online",
  "Em Produção":"tag-low",
  "Aguardando Peças":"tag-pending",
  "Pronto para Retirada":"tag-done",
  "Entregue":"tag-integra",
  "Cancelado":"tag-out"
};
const ENC_TIPOS = ["Uniforme Sob Medida","Fardamento Completo","Bordado/Personalização","Kit Escolar","Encomenda de Calçado","Acessório Personalizado","Outro"];


function EncomendaItensTab({form, setForm, products}){
  const [addItemProd, setAddItemProd] = React.useState('');
  const [addItemQty, setAddItemQty] = React.useState(1);
  const items = form.items || [];

  function addItem(){
    if(!addItemProd) return;
    const p = products.find(x => String(x.id) === String(addItemProd));
    if(!p) return;
    const q = Math.max(1, parseInt(addItemQty)||1);
    const ex = items.find(x => String(x.productId) === String(p.id));
    if(ex){
      setForm(f => ({...f, items: f.items.map(x => String(x.productId) === String(p.id) ? {...x, qty: x.qty + q} : x)}));
    } else {
      setForm(f => ({...f, items: [...(f.items||[]), {productId:p.id, name:p.name, sku:p.sku||'', price:p.price, qty:q}]}));
    }
    setAddItemProd(''); setAddItemQty(1);
  }

  const total = items.reduce((a,b) => a + b.price * b.qty, 0);

  return (
    <div>
      <div style={{background:'#f0f7ff',border:'1px solid #b8d4f0',borderRadius:4,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#1a4e8e'}}>
        📦 Liste os produtos desta encomenda para facilitar a separação e o preparo do pedido.
      </div>
      <div className="flex gap-2 mb-3 items-center">
        <select value={addItemProd} onChange={e=>setAddItemProd(e.target.value)} style={{flex:2}}>
          <option value="">Selecionar produto...</option>
          {products.map(p=>(
            <option key={p.id} value={p.id}>
              {p.name} — {(p.price).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
              {p.stock>0?' (est: '+p.stock+')':' (SEM ESTOQUE)'}
            </option>
          ))}
        </select>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button className="qty-btn" onClick={()=>setAddItemQty(q=>Math.max(1,q-1))}>−</button>
          <input type="number" min="1" value={addItemQty} onChange={e=>setAddItemQty(Math.max(1,parseInt(e.target.value)||1))} style={{width:56,textAlign:'center',fontFamily:'Share Tech Mono',fontSize:13}}/>
          <button className="qty-btn" onClick={()=>setAddItemQty(q=>q+1)}>+</button>
        </div>
        <button className="btn btn-primary btn-sm" onClick={addItem}>+ Add</button>
      </div>

      {items.length > 0 ? (
        <div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Produto</th><th>SKU</th><th>Qtd</th><th>Unit.</th><th>Total</th><th></th></tr></thead>
              <tbody>
                {items.map(item=>(
                  <tr key={item.productId}>
                    <td><strong>{item.name}</strong></td>
                    <td className="text-mono" style={{fontSize:9,color:'#aaa'}}>{item.sku||'—'}</td>
                    <td>
                      <div className="qty-row">
                        <button className="qty-btn" onClick={()=>setForm(f=>({...f,items:f.items.map(x=>x.productId===item.productId?{...x,qty:Math.max(1,x.qty-1)}:x)}))}>−</button>
                        <span className="qty-n">{item.qty}</span>
                        <button className="qty-btn" onClick={()=>setForm(f=>({...f,items:f.items.map(x=>x.productId===item.productId?{...x,qty:x.qty+1}:x)}))}>+</button>
                      </div>
                    </td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{(item.price).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:1}}>{(item.price*item.qty).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</td>
                    <td><button className="btn btn-sm btn-danger" onClick={()=>setForm(f=>({...f,items:f.items.filter(x=>x.productId!==item.productId)}))}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{textAlign:'right',marginTop:10,fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2}}>
            Total: {total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
          </div>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:24,color:'#bbb',fontFamily:'Share Tech Mono',fontSize:11,letterSpacing:2,border:'1px dashed #ddd',borderRadius:3}}>
          NENHUM ITEM ADICIONADO
        </div>
      )}
    </div>
  );
}

function Encomendas({customers, products, encomendas, setEncomendas, sales, setSales, polo, notify}){
  const [modal, setModal] = useState(false);
  const [editEnc, setEditEnc] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('Todos');
  const [prioFilter, setPrioFilter] = useState('Todos');
  const [showArchived, setShowArchived] = useState(false);

  // marca quando uma encomenda chegou a um estado final (para arquivar depois de 2 dias úteis)
  useEffect(()=>{ encomendas.forEach(e=>{ if(isStatusFinal(e.status) && !bpGetTermTs(polo,e.id)) bpSetTermTs(polo,e.id,Date.now()); }); }, [encomendas]);
  const encArquivadas = encomendas.filter(e=>estaArquivado(polo,e.id,e.status));
  const encAtivas = encomendas.filter(e=>!estaArquivado(polo,e.id,e.status));

  const filtered = encomendas.filter(e =>
    (statusFilter==='Todos' || e.status===statusFilter) &&
    (prioFilter==='Todos' || e.prioridade===prioFilter) &&
    (e.numero.toLowerCase().includes(search.toLowerCase()) ||
     e.cliente.toLowerCase().includes(search.toLowerCase()) ||
     e.tipo.toLowerCase().includes(search.toLowerCase()))
  );

  function saveEnc(form){
    if(!form.cliente){ notify('Informe o cliente','error'); return; }
    if(editEnc){
      setEncomendas(prev => prev.map(e => e.id===form.id ? {...form} : e));
      notify('Encomenda atualizada!','success');
    } else {
      setEncomendas(prev => [...prev, {...form, id:Date.now()}]);
      notify('Encomenda criada!','success');
    }
    // Se a encomenda está paga e ainda não foi lançada nas vendas, registra a venda do dia
    if(form.sinalPago && setSales && !(sales||[]).some(s=>s.orderNum===form.numero)){
      setSales(prev=>[...prev, encSaleRecord({numero:form.numero, customer:form.cliente, total:parseFloat(form.precoTotal)||0, payment:form.pagamento||'Dinheiro'})]);
      notify('Encomenda paga lançada no caixa/vendas de hoje','success');
    }
    setModal(false); setEditEnc(null);
  }

  function deleteEnc(id){ if(confirm('Excluir encomenda?')){ setEncomendas(prev=>prev.filter(e=>e.id!==id)); notify('Excluída','success'); } }

  function moveEnc(enc, newStatus){
    if(enc.status===newStatus) return;
    setEncomendas(prev=>prev.map(e=>e.id===enc.id?{...e, status:newStatus, historico:[...(e.historico||[]),{status:newStatus, data:new Date().toLocaleString('pt-BR'), user:'Kanban'}]}:e));
    if(isStatusFinal(newStatus)){ if(!bpGetTermTs(polo,enc.id)) bpSetTermTs(polo,enc.id,Date.now()); } else { bpSetTermTs(polo,enc.id,0); }
    notify(`${enc.numero||'Encomenda'} → ${newStatus}`,'success');
  }

  const stats = {
    total: encomendas.length,
    novos: encomendas.filter(e=>e.status==='Novo Pedido').length,
    producao: encomendas.filter(e=>e.status==='Em Produção').length,
    prontos: encomendas.filter(e=>e.status==='Pronto para Retirada').length,
    urgentes: encomendas.filter(e=>e.prioridade==='Urgente'&&e.status!=='Entregue'&&e.status!=='Cancelado').length,
  };

  const prioStyle = (p) => ({
    'Urgente': {background:'rgba(204,34,34,.1)',color:'#cc2222',border:'1px solid rgba(204,34,34,.25)',padding:'2px 7px',borderRadius:2,fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:1,textTransform:'uppercase'},
    'Alta': {background:'rgba(153,102,34,.1)',color:'#996622',border:'1px solid rgba(153,102,34,.25)',padding:'2px 7px',borderRadius:2,fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:1,textTransform:'uppercase'},
    'Normal': {background:'rgba(100,100,100,.08)',color:'#888',border:'1px solid rgba(100,100,100,.15)',padding:'2px 7px',borderRadius:2,fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:1,textTransform:'uppercase'},
  }[p] || {});

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon">📦</div><div className="stat-label">Total Encomendas</div><div className="stat-value">{stats.total}</div></div>
        <div className="stat-card blue"><div className="stat-icon">🆕</div><div className="stat-label">Novos Pedidos</div><div className="stat-value">{stats.novos}</div></div>
        <div className="stat-card gold"><div className="stat-icon">🔧</div><div className="stat-label">Em Produção</div><div className="stat-value">{stats.producao}</div></div>

          <button className={`btn btn-sm ${showArchived?'btn-primary':''}`} onClick={()=>setShowArchived(a=>!a)}>{showArchived?'← Voltar ao quadro':`📁 Arquivadas (${encArquivadas.length})`}</button>
          <div className="search-box" style={{maxWidth:240,margin:0}}><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <button className="btn btn-primary" onClick={()=>{setEditEnc(null);setModal(true);}}>+ Nova Encomenda</button>
        </div>
      </div>
      <div className="kb-hint">{showArchived?'📁 Arquivadas — entregues/cancelados há mais de 2 dias úteis':'🖱️ Arraste os cartões entre as colunas · clique para abrir os detalhes'}</div>

      <KanbanBoard
        columns={(showArchived?['Entregue','Cancelado']:ENC_STATUS).map(s=>({key:s,label:s,color:({'Novo Pedido':'#1a4e8e','Em Produção':'#996622','Aguardando Peças':'#888','Pronto para Retirada':'#1a6e2e','Entregue':'#444','Cancelado':'#cc2222'})[s]||'#888'}))}
        items={(showArchived?encArquivadas:encAtivas).filter(e=>
          (prioFilter==='Todos'||e.prioridade===prioFilter) &&
          ((e.numero||'').toLowerCase().includes(search.toLowerCase()) || (e.cliente||'').toLowerCase().includes(search.toLowerCase()) || (e.tipo||'').toLowerCase().includes(search.toLowerCase()))
        )}
        itemKey={e=>e.id}
        itemStatus={e=>e.status}
        onMove={(e,to)=>moveEnc(e,to)}
        onCardClick={e=>{setEditEnc(e);setModal(true);}}
        renderCard={e=>(
          <div>
            <div className="kb-card-title">{e.cliente}</div>
            <div className="kb-card-sub">{e.numero} · {e.tipo||'—'}</div>
            {e.clientePhone && <div className="kb-card-sub" style={{marginTop:2,color:'#1a6e2e'}}>📱 {e.clientePhone}</div>}
            {e.escola && <div className="kb-card-sub" style={{marginTop:2}}>🏫 {e.escola}</div>}
            {(e.items&&e.items.length>0) && <div style={{margin:'7px 0 2px',borderTop:'1px dashed #ececec',paddingTop:6}}>
              {e.items.map((it,i)=><div key={i} style={{fontSize:11,color:'#555',lineHeight:1.55}}><strong style={{color:'#111'}}>{it.qty}×</strong> {it.name}</div>)}
            </div>}
            {e.descricao && <div style={{marginTop:6,fontSize:11,color:'#666',lineHeight:1.5,fontStyle:'italic'}}>{e.descricao.length>110?e.descricao.slice(0,110)+'…':e.descricao}</div>}
            <div className="kb-card-row">
              <span style={prioStyle(e.prioridade)}>{e.prioridade}</span>
              {e.precoTotal?<span className="kb-card-total">R$ {parseFloat(e.precoTotal).toFixed(2)}</span>:null}
            </div>
            <div className="kb-card-row" style={{marginTop:6}}>
              {e.prazoEntrega&&<span className="kb-card-sub">📅 {e.prazoEntrega}</span>}
              <span className="kb-pill" style={{marginLeft:'auto',background:e.sinalPago?'#e8f5e9':'#fff7e6',color:e.sinalPago?'#1a6e2e':'#996622',border:'1px solid '+(e.sinalPago?'#a5d6a7':'#f0d9a8')}}>{e.sinalPago?'✅ PAGO':'⌛ NÃO PAGO'}</span>
            </div>
          </div>
        )}
      />

      {modal && (
        <EncomendaModal
          enc={editEnc}
          customers={customers}
          products={products}
          onClose={()=>{setModal(false);setEditEnc(null);}}
          onSave={saveEnc}
          notify={notify}
        />
      )}
    </div>
  );
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boina Preta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

/* ===== POLO SELECTOR ===== */
.polo-overlay{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.polo-overlay::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,255,255,.04) 0%,transparent 70%);}
.polo-bg-text{position:absolute;font-family:"Bebas Neue",sans-serif;font-size:28vw;color:rgba(255,255,255,.018);letter-spacing:0.1em;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;user-select:none;}
.polo-container{position:relative;z-index:1;text-align:center;max-width:780px;width:100%;}
.polo-logo-wrap{margin-bottom:32px;}
.polo-logo{height:100px;object-fit:contain;filter:brightness(1.1);}
.polo-headline{font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:8px;color:#444;text-transform:uppercase;margin-bottom:8px;}
.polo-title{font-family:"Bebas Neue",sans-serif;font-size:38px;letter-spacing:6px;color:#fff;line-height:1;margin-bottom:6px;}
.polo-sub{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:4px;color:#555;margin-bottom:48px;text-transform:uppercase;}
.polo-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:32px;}
.polo-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:32px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;text-align:left;}
.polo-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);opacity:0;transition:opacity .25s;}
.polo-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5);}
.polo-card:hover::before{opacity:1;}
.polo-card-icon{font-size:36px;margin-bottom:16px;display:block;}
.polo-card-label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:6px;}
.polo-card-city{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:3px;color:#fff;line-height:1;margin-bottom:4px;}
.polo-card-state{font-family:"Oswald",sans-serif;font-size:13px;font-weight:400;letter-spacing:2px;color:#666;text-transform:uppercase;margin-bottom:16px;}
.polo-card-enter{display:inline-flex;align-items:center;gap:6px;font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#888;transition:color .2s;}
.polo-card:hover .polo-card-enter{color:#fff;}
.polo-card-arrow{font-size:14px;transition:transform .2s;}
.polo-card:hover .polo-card-arrow{transform:translateX(5px);}
.polo-card-accent{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:scaleX(0);transition:transform .3s;}
.polo-card:hover .polo-card-accent{transform:scaleX(1);}
.polo-footer{font-family:"Share Tech Mono",monospace;font-size:8px;letter-spacing:3px;color:#333;text-transform:uppercase;}
@keyframes polofadein{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.polo-container{animation:polofadein .6s ease both;}
.polo-cards .polo-card:nth-child(1){animation:polofadein .6s .1s ease both;}
.polo-cards .polo-card:nth-child(2){animation:polofadein .6s .2s ease both;}

/* ===== POLO BADGE IN ADMIN ===== */
.polo-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:4px 10px;font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;color:#aaa;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.polo-badge:hover{background:rgba(255,255,255,.15);color:#fff;}
.polo-badge-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0;}

/* ===== POLO BADGE IN STORE ===== */
.store-polo-bar{background:#111;border-bottom:1px solid #222;padding:6px 24px;display:flex;align-items:center;justify-content:space-between;}
.store-polo-bar-inner{max-width:1100px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;}
.store-polo-name{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase;}
.store-polo-switch{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;color:#444;cursor:pointer;transition:color .15s;background:none;border:none;padding:0;text-transform:uppercase;}
.store-polo-switch:hover{color:#aaa;}

/* ===== MEUS PEDIDOS (cliente) ===== */
.mp-root{max-width:700px;margin:0 auto;padding:28px 20px;}
.mp-header{margin-bottom:28px;}
.mp-back{background:none;border:none;font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;margin-bottom:16px;transition:color .15s;}
.mp-back:hover{color:#111;}
.mp-title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:5px;color:#111;line-height:1;}
.mp-subtitle{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:3px;color:#bbb;margin-top:4px;text-transform:uppercase;}
.mp-empty{text-align:center;padding:60px 20px;}
.mp-empty-icon{font-size:52px;margin-bottom:12px;}
.mp-empty-text{font-family:"Oswald",sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.mp-empty-sub{font-family:"Share Tech Mono",monospace;font-size:10px;color:#ccc;letter-spacing:1px;}
.mp-order{background:#fff;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:16px;overflow:hidden;transition:box-shadow .2s;}
.mp-order:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.mp-order-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12;border-bottom:1px solid #f5f5f5;cursor:pointer;user-select:none;}
.mp-order-num{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:3px;color:#111;}
.mp-order-date{font-family:"Share Tech Mono",monospace;font-size:9px;color:#bbb;letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
.mp-order-total{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;color:#111;text-align:right;}
.mp-order-total-lbl{font-family:"Share Tech Mono",monospace;font-size:8px;letter-spacing:2px;color:#bbb;text-align:right;text-transform:uppercase;}
.mp-order-body{padding:0 20px 20px;}
/* Timeline */
.mp-timeline{display:flex;align-items:flex-start;gap:0;padding:20px 0 16px;overflow-x:auto;}
.mp-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:70px;position:relative;}
.mp-step-line{position:absolute;top:14px;left:50%;right:-50%;height:2px;background:#e8e8e8;z-index:0;}
.mp-step:last-child .mp-step-line{display:none;}
.mp-step-line.done{background:#111;}
.mp-step-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e8e8e8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;position:relative;z-index:1;transition:all .3s;flex-shrink:0;}
.mp-step-dot.done{border-color:#111;background:#111;color:#fff;}
.mp-step-dot.active{border-color:#111;background:#fff;box-shadow:0 0 0 3px rgba(17,17,17,.12);}
.mp-step-dot.cancelled{border-color:#cc2222;background:#cc2222;color:#fff;}
.mp-step-label{font-family:"Share Tech Mono",monospace;font-size:8px;letter-spacing:1px;color:#bbb;text-transform:uppercase;margin-top:7px;text-align:center;line-height:1.3;}
.mp-step-label.done{color:#111;font-weight:600;}
.mp-step-label.active{color:#111;}
.mp-items-list{border-top:1px solid #f0f0f0;padding-top:14px;}
.mp-item-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f9f9f9;}
.mp-item-row:last-child{border-bottom:none;}
.mp-item-name{flex:1;font-family:"Oswald",sans-serif;font-size:13px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:#333;}
.mp-item-qty{font-family:"Share Tech Mono",monospace;font-size:10px;color:#aaa;white-space:nowrap;}
.mp-item-price{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:1px;color:#111;white-space:nowrap;}
.mp-status-banner{border-radius:4px;padding:12px 14px;margin-bottom:14px;font-size:12px;display:flex;align-items:center;gap:10px;}
.mp-status-banner.aguardando{background:#fff8e8;border:1px solid #e6a800;color:#7a5500;}
.mp-status-banner.separando{background:#e8f0ff;border:1px solid #3355cc;color:#1a2e88;}
.mp-status-banner.pronto{background:#e8f9ee;border:1px solid #1a6e2e;color:#1a6e2e;}
.mp-status-banner.entregue{background:#f0f0f0;border:1px solid #ccc;color:#555;}
.mp-status-banner.cancelado{background:#fde8e8;border:1px solid #cc2222;color:#a01010;}
.mp-chevron{font-size:12px;transition:transform .2s;color:#ccc;flex-shrink:0;}
.mp-chevron.open{transform:rotate(180deg);}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;}

/* ===== RESPONSIVE ===== */

/* --- Tablet landscape & small desktop (max 1024px) --- */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .admin-main{margin-left:200px;}
  .sidebar{width:200px;}
  .store-nav-cat{padding:0 10px;font-size:11px;}
}

/* --- Tablet portrait (max 768px) --- */
@media(max-width:768px){
  /* Admin sidebar → drawer */
  .hamburger{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform .3s;width:260px;z-index:200;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .admin-main{margin-left:0;}
  .topbar{padding:10px 14px;gap:8px;}
  .page-title{font-size:16px;letter-spacing:2px;}
  .topbar-badge{display:none;}
  .topbar-badge:first-child{display:inline-block;}
  .admin-content{padding:14px 14px;}

  /* Stats */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;}

  /* Caixa */
  .caixa-grid{grid-template-columns:1fr;}

  /* Tables */
  .table-wrap{-webkit-overflow-scrolling:touch;}

  /* Store hero */
  .store-hero-inner{padding:24px 16px;gap:18px;flex-wrap:wrap;}
  .store-hero-logo{height:72px;}
  .store-hero-title{font-size:36px;letter-spacing:4px;}
  .store-hero-slogan{font-size:9px;letter-spacing:3px;}
  .store-hero-sub{font-size:12px;}

  /* Store nav */
  .store-nav-inner{padding:0 12px;height:auto;flex-wrap:wrap;gap:0;}
  .store-nav-cats{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;width:100%;padding-bottom:2px;}
  .store-nav-cat{padding:0 10px;font-size:10px;white-space:nowrap;height:46px;}
  .store-nav-right{padding:6px 0;gap:6px;}
  .login-btn-nav{padding:6px 10px;font-size:10px;}
  .cart-btn{padding:6px 10px;font-size:10px;}

  /* Store body */
  .store-body{padding:16px 14px;}
  .store-section-title{font-size:22px;}
  .store-search{max-width:100%;}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}

  /* Cart drawer full width */
  .cart-drawer{width:100%;}

  /* Checkout */
  .checkout-wrap{padding:16px 14px;}
  .delivery-opts{grid-template-columns:1fr;}

  /* Polo selector */
  .polo-cards{grid-template-columns:1fr 1fr;}
  .polo-title{font-size:28px;letter-spacing:4px;}
  .polo-card{padding:22px 18px;}
  .polo-card-city{font-size:22px;}
  .polo-logo{height:72px;}
  .polo-sub{margin-bottom:28px;}

  /* Modal */
  .modal{padding:18px 14px;max-height:94vh;}

  /* Form grid */
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:1/-1;}
}

/* --- Mobile (max 480px) --- */
@media(max-width:480px){
  /* Stats single column */
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-value{font-size:22px;}

  /* Store hero compact */
  .store-hero-inner{padding:16px 14px;gap:12px;}
  .store-hero-logo{height:56px;}
  .store-hero-title{font-size:28px;letter-spacing:3px;}
  .store-hero-sub{display:none;}

  /* Products grid: 2 columns */
  .products-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .product-body{padding:10px;}
  .product-name{font-size:12px;}
  .product-price{font-size:20px;}
  .product-img{height:140px;}
  .product-add-btn{font-size:9px;padding:7px;}

  /* Polo selector */
  .polo-title{font-size:22px;letter-spacing:3px;}
  .polo-logo{height:60px;}
  .polo-logo-wrap{margin-bottom:20px;}
  .polo-card-city{font-size:18px;}
  .polo-bg-text{font-size:40vw;}
  .polo-cards{grid-template-columns:1fr;}

  /* Admin topbar */
  .topbar{padding:8px 12px;}
  .page-title{font-size:14px;}
  .page-sub{display:none;}
  .admin-content{padding:10px 10px;}

  /* Notif */
  .notif{left:12px;right:12px;bottom:12px;max-width:none;}

  /* Checkout steps text */
  .checkout-step span{display:none;}
  .checkout-step-num{width:30px;height:30px;font-size:12px;}
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#f0f0f0;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

/* ===== TOKENS ===== */
:root{
  --black:#111;--dark:#1a1a1a;--bg:#f0f0f0;--card:#fff;--border:#e0e0e0;
  --t1:#111;--t2:#555;--t3:#999;
  --success:#1a6e2e;--danger:#cc2222;--warning:#996622;--info:#1a4e8e;
  --sidebar:#111;--sb-text:#bbb;--sb-active:#fff;--sb-border:#2a2a2a;
}

/* ===== SHARED ===== */
body{background:var(--bg);color:var(--t1);font-family:"Barlow",sans-serif;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card+.card,.card{margin-bottom:16px;}
.card-title{font-family:"Oswald",sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;display:block;margin-bottom:4px;}
input,select,textarea{background:#fafafa;border:1px solid #ccc;color:var(--t1);padding:8px 11px;font-family:"Barlow",sans-serif;font-size:13px;border-radius:3px;outline:none;transition:border .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#888;background:#fff;}
select option{background:#fff;color:#111;}
textarea{resize:vertical;min-height:70px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.form-group.full,.section-divider{grid-column:1/-1;}
.section-divider{font-family:"Oswald",sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t2);padding:12px 0 6px;border-bottom:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #ccc;background:#f5f5f5;color:var(--t1);font-family:"Oswald",sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s;}
.btn:hover{background:#e8e8e8;border-color:#aaa;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--black);color:#fff;border-color:var(--black);}
.btn-primary:hover{background:#333;}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:5px 10px;font-size:10px;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--t2);}
.btn-ghost:hover{background:#f0f0f0;border-color:#ddd;}
.w-full{width:100%;}
.flex{display:flex;}.gap-2{gap:8px;}.gap-3{gap:12px;}.flex-1{flex:1;}
.justify-between{justify-content:space-between;}.items-center{align-items:center;}
.mb-2{margin-bottom:10px;}.mb-3{margin-bottom:16px;}.mb-4{margin-bottom:22px;}
.mt-2{margin-top:10px;}.mt-3{margin-top:16px;}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.text-mono{font-family:"Share Tech Mono",monospace;}
.text-faint{color:var(--t3);}
.text-sm{font-size:12px;}
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.tag-ok{background:rgba(26,110,46,.1);color:#1a6e2e;border:1px solid rgba(26,110,46,.25);}
.tag-low{background:rgba(153,102,34,.1);color:#996622;border:1px solid rgba(153,102,34,.25);}
.tag-out{background:rgba(204,34,34,.1);color:#cc2222;border:1px solid rgba(204,34,34,.25);}
.tag-done{background:rgba(26,110,46,.1);color:#1a6e2e;border:1px solid rgba(26,110,46,.25);}
.tag-pending{background:rgba(120,120,120,.1);color:#666;border:1px solid rgba(120,120,120,.2);}
.tag-online{background:rgba(26,60,150,.1);color:#1a3c96;border:1px solid rgba(26,60,150,.2);}
.tag-loja{background:rgba(90,30,150,.1);color:#5a1e96;border:1px solid rgba(90,30,150,.2);}
.tag-integra{background:rgba(0,100,60,.1);color:#00643c;border:1px solid rgba(0,100,60,.2);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:9px 11px;text-align:left;border-bottom:2px solid var(--border);background:#fafafa;}
tbody tr{border-bottom:1px solid #f5f5f5;transition:background .1s;}
tbody tr:hover{background:#fafafa;}
tbody td{padding:9px 11px;color:#444;vertical-align:middle;}
td strong{color:var(--t1);font-weight:600;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:16px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:#ddd;}
.stat-card.green::before{background:var(--success);}
.stat-card.red::before{background:var(--danger);}
.stat-card.gold::before{background:var(--warning);}
.stat-card.blue::before{background:var(--info);}
.stat-label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:2px;color:var(--t1);line-height:1;}
.stat-change{font-family:"Share Tech Mono",monospace;font-size:9px;margin-top:4px;color:var(--t3);}
.stat-icon{position:absolute;right:14px;top:12px;font-size:22px;opacity:.1;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border:1px solid #ccc;border-radius:4px;padding:24px;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:3px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:2px;}
.modal-close:hover{color:var(--t1);}

  function handle(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);}

    <img src={value} className="img-preview" alt=""/>
    <button className="btn btn-sm btn-danger" style={{position:"absolute",top:4,right:4,padding:"2px 6px"}} onClick={()=>onChange("")}>✕</button>
  </div>;
  return <div className="img-upload" onClick={()=>ref.current.click()}>
    <input type="file" accept="image/*" ref={ref} style={{display:"none"}} onChange={handle}/>
    <div style={{fontSize:28,marginBottom:6}}>📷</div>
    <div style={{fontFamily:"Share Tech Mono",fontSize:9,letterSpacing:2,color:"#bbb"}}>CLIQUE PARA ADICIONAR FOTO</div>
  </div>;
}


// Canal de uma venda — distingue Loja, Online e Encomenda (encomenda = orderNum ENC-)
function isEncSale(s){ return !!s && String(s.orderNum||'').startsWith('ENC-'); }
function saleCanal(s){
  if(s && s.type==='online') return {label:'ONLINE', cls:'tag-online'};
  if(isEncSale(s)) return {label:'ENCOMENDA', cls:'tag-integra'};
  return {label:'LOJA', cls:'tag-loja'};
}

// ====== ALERTA DE ESTOQUE BAIXO — TODOS OS POLOS (Dashboard, admin/gerente) ======
function CrossPoloStockAlert(){
  const [rows,setRows]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{ let on=true; sb.from('products').select('*').then(({data})=>{ if(on){ setRows((data||[]).map(prodFromDB)); setLoaded(true); } }); return ()=>{on=false;}; },[]);
  if(!loaded) return null;
  const alerts=[];
  rows.forEach(r=>{ const min=r.minStock||5; if(r.stock<=min) alerts.push({name:r.name, sigla:(POLOS[r.polo]&&POLOS[r.polo].sigla)||r.polo, stock:r.stock, min, zero:r.stock===0}); });
  if(alerts.length===0) return null;
  alerts.sort((a,b)=>a.stock-b.stock);
  const zeros=alerts.filter(a=>a.zero).length;
  return (
    <div style={{background:'#fff7e6',border:'1px solid #e6a800',borderRadius:6,padding:'12px 16px',marginBottom:16}}>
      <div style={{fontFamily:'Oswald',fontSize:12,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'#9a6a00',marginBottom:8}}>
        🏪 Estoque baixo · todos os polos — {alerts.length} item(ns){zeros>0?` · ${zeros} esgotado(s)`:''}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {alerts.slice(0,40).map((a,i)=>(
          <span key={i} className="kb-pill" style={{background:a.zero?'#fde8e8':'#fff4e0',color:a.zero?'#cc2222':'#9a6a00',border:'1px solid '+(a.zero?'#f3c2c2':'#f0d9a8')}}>{a.sigla} · {a.name} — {a.zero?'ESGOTADO':`${a.stock}/${a.min}`}</span>
        ))}
        {alerts.length>40&&<span className="kb-pill" style={{background:'#eee',color:'#666',border:'1px solid #ddd'}}>+{alerts.length-40} mais</span>}
      </div>
    </div>
  );
}

          <div><div style={{fontFamily:"Oswald",fontSize:12,fontWeight:500,textTransform:"uppercase",letterSpacing:1}}>{p.name}</div><div style={{fontFamily:"Share Tech Mono",fontSize:8,color:"#aaa",letterSpacing:2,marginTop:2}}>{p.sku}</div></div>

      <div className="table-wrap"><table><thead><tr>{["#","Data","Cliente","Produto","Qtd","Total","Pagamento","Canal","Status"].map(h=><th key={h}>{h}</th>)}</tr></thead>

          <td className="text-mono" style={{fontSize:10}}>{s.date}</td>

          <td><span className={`tag ${saleCanal(s).cls}`}>{saleCanal(s).label}</span></td>
          <td><span className={`tag ${s.status==="Concluído"?"tag-done":"tag-pending"}`}>{s.status}</span></td>
        </tr>)}</tbody>

    {selectedSale&&<SaleDetailModal sale={selectedSale} allSales={sales} onClose={()=>setSelectedSale(null)}/>}
  </div>;
}

function Transferencia({products, setProducts, polo, poloInfo, notify}){
  const outrosPolos = Object.values(POLOS).filter(p=>p.id!==polo);
  const [poloDestino, setPoloDestino] = useState(outrosPolos[0]?.id||'');
  const outroPolo    = poloDestino;
  const outroPoloObj = POLOS[outroPolo]||outrosPolos[0]||{sigla:'',nome:''};
  const outroPoloNome = outroPoloObj.nome;
  const outroPoloSigla = outroPoloObj.sigla;

  const [search,setSearch]=useState('');
  const [prodDestino,setProdDestino]=useState([]);
  const [loadingDestino,setLoadingDestino]=useState(true);
  const [modal,setModal]=useState(null); // produto selecionado
  const [qty,setQty]=useState(1);
  const [obs,setObs]=useState('');
  const [saving,setSaving]=useState(false);
  const [historico,setHistorico]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('transferencias_'+polo)||'[]');}catch(e){return [];}
  });
  const [tab,setTab]=useState('enviar'); // 'enviar'|'historico'

  // Carrega produtos do polo destino
  useEffect(()=>{
    setLoadingDestino(true);
    sb.from('products').select('*').eq('polo',outroPolo).then(({data})=>{
      setProdDestino((data||[]).map(prodFromDB));
      setLoadingDestino(false);
    });
  },[outroPolo]);

  const filtered = products.filter(p=>
    p.name.toLowerCase().includes(search.toLowerCase())||
    (p.sku||'').toLowerCase().includes(search.toLowerCase())
  );

  async function transferir(){
    if(!modal||qty<1){notify('Selecione um produto e quantidade válida','error');return;}
    if(qty>modal.stock){notify(`Estoque insuficiente. Disponível: ${modal.stock} un.`,'error');return;}
    setSaving(true);

    // 1. Desconta do polo atual
    const novoStockOrigem = modal.stock - qty;
    const {error:e1} = await sb.from('products')
      .eq('id',String(modal.id)).eq('polo',polo)
      .update({stock: novoStockOrigem});
    if(e1){notify('Erro ao debitar estoque: '+e1.message,'error');setSaving(false);return;}

    // 2. Procura produto correspondente no polo destino (por SKU ou nome)
    const destino = prodDestino.find(p=>
      (p.sku&&p.sku===modal.sku) || p.name===modal.name
    );

    if(destino){
      // Incrementa no destino
      const {error:e2} = await sb.from('products')
        .eq('id',String(destino.id)).eq('polo',outroPolo)
        .update({stock: destino.stock + qty});
      if(e2){notify('Transferência parcial: origem debitada mas destino com erro. Verifique.','error');setSaving(false);return;}
      setProdDestino(prev=>prev.map(p=>p.id===destino.id?{...p,stock:p.stock+qty}:p));
    } else {
      // Cria produto no polo destino
      const novoProd = {
        ...prodToDB({...modal,id:Date.now(),stock:qty},outroPolo),
        id: String(Date.now())
      };
      const {error:e2} = await sb.from('products').insert(novoProd);
      if(e2){notify('Produto criado no destino com erro: '+e2.message,'error');setSaving(false);return;}
      setProdDestino(prev=>[...prev,prodFromDB(novoProd)]);
    }

    // 3. Atualiza estado local do polo atual
    setProducts(prev=>prev.map(p=>p.id===modal.id?{...p,stock:novoStockOrigem}:p));

    // 4. Registra movimentação nos dois polos
    registrarMov(polo, modal, 'saida_transferencia', modal.stock, -qty, 'TRANSF→'+outroPoloSigla, obs||'', 'Admin');
    if(destino){
      registrarMov(outroPolo, destino, 'entrada_transferencia', destino.stock, qty, 'TRANSF←'+poloInfo.sigla, obs||'', 'Admin');
    }

    // 4. Registra no histórico
    const reg = {
      id: Date.now(),
      data: new Date().toLocaleDateString('pt-BR'),
      hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      produto: modal.name,
      sku: modal.sku||'—',
      qty,
      origem: poloInfo.sigla,
      destino: outroPoloSigla,
      obs: obs||'—',
    };
    const novoHist = [reg, ...historico].slice(0,100);
    setHistorico(novoHist);
    try{localStorage.setItem('transferencias_'+polo, JSON.stringify(novoHist));}catch(e){}

    notify(`✓ ${qty} un. de "${modal.name}" transferidas para ${outroPoloSigla}!`,'success');
    setModal(null);setQty(1);setObs('');setSaving(false);
  }

  return <div>
    <div style={{background:'linear-gradient(135deg,#111 0%,#1a2a3a 100%)',borderRadius:6,padding:'12px 18px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:3,color:'#fff',lineHeight:1}}>{poloInfo.sigla}</div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:2,color:'#555',textTransform:'uppercase'}}>Origem</div>
        </div>
        <div style={{fontSize:22,color:'#444'}}>→</div>
        <div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:2,color:'#555',textTransform:'uppercase',marginBottom:4}}>Polo Destino</div>
          <select value={poloDestino} onChange={e=>{setPoloDestino(e.target.value);setProdDestino([]);setLoadingDestino(true);}}
            style={{background:'#1a2a3a',border:'1px solid #2a3a4a',color:'#4a8cc9',fontFamily:'Oswald,sans-serif',fontSize:13,fontWeight:600,letterSpacing:2,textTransform:'uppercase',padding:'6px 10px',borderRadius:3,cursor:'pointer'}}>
            {outrosPolos.map(p=><option key={p.id} value={p.id}>{p.sigla} — {p.nome}</option>)}
          </select>
          <div style={{fontFamily:'Share Tech Mono',fontSize:9,color:'#555',marginTop:4}}>
            {loadingDestino?'Carregando...':prodDestino.length+' produtos cadastrados'}
          </div>
        </div>
      </div>
      <div style={{fontFamily:'Share Tech Mono',fontSize:9,color:'#444',letterSpacing:1,textTransform:'uppercase',textAlign:'right'}}>
        Estoque do polo destino<br/>é atualizado em tempo real
      </div>
    </div>

    <div className="tabs mb-3">
      <div className={`tab ${tab==='enviar'?'active':''}`} onClick={()=>setTab('enviar')}>📦 Enviar Estoque</div>
      <div className={`tab ${tab==='historico'?'active':''}`} onClick={()=>setTab('historico')}>📋 Histórico ({historico.length})</div>
    </div>

    {tab==='enviar'&&<>
      <div className="search-box mb-3"><span className="search-icon">🔍</span><input placeholder="Buscar produto para transferir..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr>{['Produto','SKU','Estoque Aqui',outroPoloSigla+' tem?','Status','Ação'].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>
              {!filtered.length&&<tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'#bbb'}}>Nenhum produto encontrado</td></tr>}
              {filtered.map(p=>{
                const dest = prodDestino.find(d=>(d.sku&&d.sku===p.sku)||d.name===p.name);
                return <tr key={p.id}>
                  <td><strong>{p.name}</strong></td>
                  <td className="text-mono" style={{fontSize:9,color:'#aaa'}}>{p.sku||'—'}</td>
                  <td>
                    <span className="text-mono" style={{fontSize:13,fontWeight:600,color:p.stock===0?'#cc2222':p.stock<=p.minStock?'#996622':'#111'}}>{p.stock} un.</span>
                  </td>
                  <td>
                    {loadingDestino
                      ? <span style={{color:'#aaa',fontSize:11}}>...</span>
                      : dest
                        ? <span className="text-mono" style={{fontSize:12,color:dest.stock===0?'#cc2222':'#1a6e2e'}}>{dest.stock} un.</span>
                        : <span className="tag tag-pending" style={{fontSize:8}}>Não cadastrado</span>
                    }
                  </td>
                  <td>
                    {p.stock===0
                      ? <span className="tag tag-out">Sem Estoque</span>
                      : p.stock<=p.minStock
                        ? <span className="tag tag-low">Estoque Baixo</span>
                        : <span className="tag tag-ok">Disponível</span>
                    }
                  </td>
                  <td>
                    <button className="btn btn-sm btn-primary" disabled={p.stock===0}
                      onClick={()=>{setModal(p);setQty(1);setObs('');}}>
                      → Transferir
                    </button>
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </>}

    {tab==='historico'&&<div className="card">
      {!historico.length
        ? <div style={{textAlign:'center',padding:40,color:'#bbb',fontFamily:'Share Tech Mono',fontSize:10,letterSpacing:2}}>NENHUMA TRANSFERÊNCIA REGISTRADA</div>
        : <div className="table-wrap">
            <table>
              <thead><tr>{['Data/Hora','Produto','SKU','Qtd','Origem','Destino','Obs'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {historico.map(r=>(
                  <tr key={r.id}>
                    <td className="text-mono" style={{fontSize:9}}>{r.data} {r.hora}</td>
                    <td><strong>{r.produto}</strong></td>
                    <td className="text-mono" style={{fontSize:9,color:'#aaa'}}>{r.sku}</td>
                    <td style={{fontFamily:'Bebas Neue',fontSize:16,letterSpacing:1,color:'#1a4e8e'}}>{r.qty}</td>
                    <td><span className="tag tag-loja">{r.origem}</span></td>
                    <td><span className="tag tag-online">{r.destino}</span></td>
                    <td style={{fontSize:11,color:'#888'}}>{r.obs}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
      }
    </div>}

    {modal&&(
      <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="modal" style={{maxWidth:460}}>
          <div className="modal-title">
            Transferir Estoque
            <button className="modal-close" onClick={()=>setModal(null)}>✕</button>
          </div>

          <div style={{background:'#f0f7ff',border:'1px solid #b8d4f0',borderRadius:4,padding:'12px 14px',marginBottom:16,fontSize:12,color:'#1a4e8e'}}>
            <div style={{fontFamily:'Oswald',fontSize:14,fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{modal.name}</div>
            <div style={{display:'flex',gap:20}}>
              <span>SKU: <strong>{modal.sku||'—'}</strong></span>
              <span>Disponível: <strong>{modal.stock} un.</strong></span>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20,padding:'14px 0',marginBottom:16,background:'#f9f9f9',borderRadius:4,border:'1px solid #e8e8e8'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:3,color:'#111'}}>{poloInfo.sigla}</div>
              <div style={{fontFamily:'Share Tech Mono',fontSize:8,color:'#aaa',letterSpacing:2}}>ORIGEM</div>
            </div>
            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:'#aaa',letterSpacing:2}}>→ {qty} un. →</div>
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:3,color:'#1a4e8e'}}>{outroPoloSigla}</div>
              <div style={{fontFamily:'Share Tech Mono',fontSize:8,color:'#aaa',letterSpacing:2}}>DESTINO</div>
            </div>
          </div>

          <div className="form-group mb-3">
            <label>Quantidade a Transferir *</label>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button className="qty-btn" style={{width:36,height:36,fontSize:18}} onClick={()=>setQty(q=>Math.max(1,q-1))}>−</button>
              <input type="number" min="1" max={modal.stock} value={qty}
                onChange={e=>setQty(Math.min(modal.stock,Math.max(1,parseInt(e.target.value)||1)))}
                style={{textAlign:'center',fontFamily:'Bebas Neue',fontSize:28,letterSpacing:2,padding:'8px',width:100}}/>
              <button className="qty-btn" style={{width:36,height:36,fontSize:18}} onClick={()=>setQty(q=>Math.min(modal.stock,q+1))}>+</button>
              <span style={{fontFamily:'Share Tech Mono',fontSize:9,color:'#aaa',letterSpacing:1}}>MÁX: {modal.stock}</span>
            </div>
          </div>

          <div className="form-group mb-4">
            <label>Observação (opcional)</label>
            <input placeholder="Ex: Reforço de estoque, pedido urgente..." value={obs} onChange={e=>setObs(e.target.value)}/>
          </div>

          <div style={{background:'#fff8e8',border:'1px solid #e6c800',borderRadius:4,padding:'10px 14px',marginBottom:16,fontSize:11,color:'#7a5500'}}>
            ⚠ Esta operação irá <strong>reduzir em {qty} un.</strong> o estoque de <strong>{poloInfo.sigla}</strong> e <strong>adicionar {qty} un.</strong> em <strong>{outroPoloSigla}</strong>. Não pode ser desfeita automaticamente.
          </div>

          <div className="modal-actions">
            <button className="btn" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={transferir} disabled={saving}>
              {saving?'Transferindo...':'✓ Confirmar Transferência'}
            </button>
          </div>
        </div>
      </div>
    )}
  </div>;
}

const TIPO_MOV = {
  'entrada_manual':       {label:'Entrada Manual',       color:'#1a6e2e', sinal:'+', tag:'tag-ok'},
  'ajuste_positivo':      {label:'Ajuste +',             color:'#1a6e2e', sinal:'+', tag:'tag-ok'},
  'ajuste_negativo':      {label:'Ajuste −',             color:'#cc2222', sinal:'−', tag:'tag-out'},
  'saida_venda':          {label:'Venda Loja',           color:'#1a4e8e', sinal:'−', tag:'tag-online'},
  'saida_venda_online':   {label:'Venda Online',         color:'#5a1e96', sinal:'−', tag:'tag-loja'},
  'saida_orcamento':      {label:'Orçamento',            color:'#996622', sinal:'−', tag:'tag-low'},
  'saida_transferencia':  {label:'Transferência Saída',  color:'#cc2222', sinal:'−', tag:'tag-out'},
  'entrada_transferencia':{label:'Transferência Entrada',color:'#1a6e2e', sinal:'+', tag:'tag-ok'},
};

async function registrarMov(polo, produto, tipo, qtdAntes, variacao, ref='', obs='', operador='Sistema'){
  const now = new Date();
  const row = {
    id: String(Date.now()+Math.random()),
    polo,
    produto_id: String(produto.id),
    produto: produto.name,
    sku: produto.sku||'',
    tipo,
    qtd_antes: qtdAntes,
    variacao,
    qtd_depois: qtdAntes + variacao,
    ref,
    obs,
    operador,
    data: now.toLocaleDateString('pt-BR'),
    hora: now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    ts: now.getTime(),
  };
  try{ await sb.from('mov_estoque').insert(row); }catch(e){ /* silencioso */ }
}

function HistoricoEstoque({polo, products}){
  const [movs, setMovs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [tipoFiltro, setTipoFiltro] = useState('Todos');
  const [prodFiltro, setProdFiltro] = useState('Todos');
  const [limit, setLimit] = useState(50);

  useEffect(()=>{
    setLoading(true);
    sb.from('mov_estoque').select('*').eq('polo',polo)
      .order('ts',{ascending:false}).limit(200)
      .then(({data})=>{ setMovs(data||[]); setLoading(false); });
  },[polo]);

  const filtered = movs.filter(m=>
    (tipoFiltro==='Todos'||m.tipo===tipoFiltro) &&
    (prodFiltro==='Todos'||m.produto_id===prodFiltro) &&
    (m.produto.toLowerCase().includes(search.toLowerCase())||
     (m.sku||'').toLowerCase().includes(search.toLowerCase())||
     (m.ref||'').toLowerCase().includes(search.toLowerCase()))
  ).slice(0, limit);

  // estatísticas resumo
  const hoje = new Date().toLocaleDateString('pt-BR');
  const movHoje = movs.filter(m=>m.data===hoje);
  const entradasHoje = movHoje.filter(m=>m.variacao>0).reduce((a,b)=>a+b.variacao,0);
  const saidasHoje  = movHoje.filter(m=>m.variacao<0).reduce((a,b)=>a+Math.abs(b.variacao),0);

  const tiposUnicos = [...new Set(movs.map(m=>m.tipo))];
  const prodsUnicos = products.map(p=>({id:String(p.id), name:p.name}));

  function exportarCSV(){
    exportCSV('historico-estoque-'+polo+'-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-'),
      ['Data','Hora','Produto','SKU','Tipo','Qtd Antes','Variação','Qtd Depois','Referência','Obs','Operador'],

        <div className="stat-change">{movHoje.filter(m=>m.variacao>0).length} movimentos</div>

        <div className="stat-icon">📉</div>
        <div className="stat-label">Saídas Hoje</div>
        <div className="stat-value">-{saidasHoje}</div>
        <div className="stat-change">{movHoje.filter(m=>m.variacao<0).length} movimentos</div>
      </div>
      <div className="stat-card blue">
        <div className="stat-icon">📋</div>
        <div className="stat-label">Total Registros</div>
        <div className="stat-value">{movs.length}</div>
        <div className="stat-change">últimos 200</div>
      </div>
      <div className="stat-card">
        <div className="stat-icon">📦</div>
        <div className="stat-label">Produtos Movimentados</div>
        <div className="stat-value">{new Set(movHoje.map(m=>m.produto_id)).size}</div>
        <div className="stat-change">hoje</div>
      </div>
    </div>

    {/* Filtros */}
    <div className="card mb-3">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:10,alignItems:'end'}}>

          <label>Buscar produto / SKU / referência</label>

            <span className="search-icon">🔍</span>
            <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>

// ====== CAIXA — ABERTURA / SANGRIA / SUPRIMENTO ======
// Estado do caixa: guardado em memória por sessão (polo + turno)
// { status:'fechado'|'aberto', abertura:{valor,operador,hora,obs}, movimentos:[{tipo,valor,obs,hora}] }

function useCaixaSession(polo, operador){
  const KEY = `caixa_${polo}`;
  const [caixa, setCaixaRaw] = useState(()=>{
    try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):{status:'fechado',abertura:null,movimentos:[]}; }
    catch(e){ return {status:'fechado',abertura:null,movimentos:[]}; }
  });
  function setCaixa(val){
    const next = typeof val==='function'?val(caixa):val;
    setCaixaRaw(next);
    try{ localStorage.setItem(KEY, JSON.stringify(next)); }catch(e){}
  }
  function abrir(valorInicial, obs){
    const now=new Date();
    setCaixa({
      status:'aberto',
      abertura:{ valor:parseFloat(valorInicial)||0, operador:operador?.nome||'Operador', hora:now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), data:now.toLocaleDateString('pt-BR'), obs },
      movimentos:[]
    });
  }
  function fechar(obs){
    setCaixa(prev=>({...prev, status:'fechado', fechamento:{ hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), data:new Date().toLocaleDateString('pt-BR'), obs }}));
  }
  function addMovimento(tipo, valor, obs){
    // tipo: 'sangria' | 'suprimento'
    setCaixa(prev=>({...prev, movimentos:[...(prev.movimentos||[]),{ tipo, valor:parseFloat(valor)||0, obs, hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), data:new Date().toLocaleDateString('pt-BR') }]}));
  }
  // total em caixa = abertura + suprimentos - sangrias
  function totalCaixa(salesDinheiro=0){
    const ab = caixa.abertura?.valor||0;
    const movs = (caixa.movimentos||[]).reduce((acc,m)=> acc+(m.tipo==='suprimento'?m.valor:-m.valor), 0);
    return ab + movs + salesDinheiro;
  }
  return {caixa, abrir, fechar, addMovimento, totalCaixa};
}

function Caixa({products,setProducts,sales,setSales,encomendas,setEncomendas,customers,notify,polo,operador}){
  const {caixa, abrir, fechar, addMovimento, totalCaixa} = useCaixaSession(polo, operador);
  const [movModal,setMovModal]=useState(null); // 'sangria'|'suprimento'|null
  const [fechModal,setFechModal]=useState(false);
  const [cart,setCart]=useState([]),[search,setSearch]=useState(""),[payment,setPayment]=useState("Dinheiro"),[customer,setCustomer]=useState(""),[paid,setPaid]=useState(""),[done,setDone]=useState(null);
  const [outOfStockModal,setOutOfStockModal]=useState(null);
  const [quickEncModal,setQuickEncModal]=useState(null);
  const [postSaleEncItems,setPostSaleEncItems]=useState([]);
  const [confirmVenda,setConfirmVenda]=useState(false);
  const filtered=products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  const total=cart.reduce((a,b)=>a+b.price*b.qty,0);
  const troco=payment==="Dinheiro"&&paid?Math.max(0,parseFloat(paid)-total):0;
  function add(p){
    if(p.stock===0){setOutOfStockModal(p);return;}
    const ex=cart.find(x=>x.id===p.id&&!x.isEncomenda);
    if(ex&&ex.qty>=p.stock){
      setOutOfStockModal({...p,_overQty:ex.qty+1});
      return;
    }
    setCart(prev=>{
      const existing=prev.find(x=>x.id===p.id&&!x.isEncomenda);
      if(existing){
        const newQty=existing.qty+1;
        if(newQty===p.stock) notify("⚠ Última unidade disponível!","error");
        return prev.map(x=>x.id===p.id&&!x.isEncomenda?{...x,qty:newQty}:x);
      }
      if(p.stock<=p.minStock) notify("⚠ Estoque baixo: apenas "+p.stock+" un. disponíveis","error");
      return[...prev,{...p,qty:1}];
    });
  }
  function setCaixaQty(id,q){
    const cartItem=cart.find(x=>x.id===id);
    if(cartItem&&cartItem.isEncomenda){setCart(prev=>prev.map(x=>x.id===id?{...x,qty:Math.max(1,q)}:x));return;}
    const p=products.find(x=>x.id===id);
    if(!p) return;
    if(q<=0){setCart(prev=>prev.filter(x=>x.id!==id));return;}
    if(q>p.stock){setOutOfStockModal({...p,_overQty:q});return;}
    setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));
  }
  function qty(id,q){
    if(q<=0){setCart(prev=>prev.filter(x=>x.id!==id));return;}
    const cartItem=cart.find(x=>x.id===id);
    if(cartItem&&cartItem.isEncomenda){setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));return;}
    const p=products.find(x=>x.id===id);
    if(p&&q>p.stock){
      setOutOfStockModal({...p,_overQty:q});
      return;
    }
    setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));
  }
  function abrirConfirmacao(){
    if(!cart.length){notify("Carrinho vazio","error");return;}
    const regularItems = cart.filter(x=>!x.isEncomenda);
    const stockErr = regularItems.find(item=>{const p=products.find(x=>x.id===item.id);return p&&item.qty>p.stock;});
    if(stockErr){
      const p=products.find(x=>x.id===stockErr.id);
      if(p) setOutOfStockModal({...p,_overQty:stockErr.qty});
      return;
    }
    if(payment==="Dinheiro" && paid && parseFloat(paid)<total){ notify("Valor recebido menor que o total","error"); return; }
    setConfirmVenda(true);
  }
  function fin(){
    setConfirmVenda(false);
    const regularItems = cart.filter(x=>!x.isEncomenda);
    const now=new Date(),date=now.toLocaleDateString("pt-BR");
    const caixaOrderNum="PDV-"+String(Date.now()).slice(-6);
    const ns=regularItems.map(item=>({id:Date.now()+Math.random(),productId:item.id.toString().replace('enc_',''),productName:item.name,qty:item.qty,unitPrice:item.price,total:parseFloat((item.price*item.qty).toFixed(2)),cost:parseFloat((item.cost*item.qty).toFixed(2)),month:now.getMonth(),week:getWeekNum(now),date,ts:now.getTime(),payment,type:"loja",status:"Concluído",customer:customer||"Consumidor Final",orderNum:caixaOrderNum,orderTs:now.getTime()}));
    setSales(prev=>[...prev,...ns]);
    setProducts(prev=>prev.map(p=>{const ci=regularItems.find(x=>x.id===p.id);return ci?{...p,stock:Math.max(0,p.stock-ci.qty)}:p;}));
    // registra movimentação de cada item vendido
    regularItems.forEach(item=>{
      const p=products.find(x=>x.id===item.id);
      if(p) registrarMov(polo,p,'saida_venda',p.stock,-item.qty,caixaOrderNum,customer||'Consumidor Final',operador?.nome||'Caixa');
    });
    const soldItems = regularItems;
    const outOfStockAfter = soldItems.map(item=>{
      const p=products.find(x=>x.id===item.id);
      if(p){const newStock=p.stock-item.qty; if(newStock<=0) return {...item, product:p};}
      return null;
    }).filter(Boolean);
    // Encomendas no carrinho: o cliente pagou o total no caixa → marca como pago e lança no caixa/vendas
    const encCartItems = cart.filter(x=>x.isEncomenda && x.encNumero);
    const encNums = new Set(encCartItems.map(x=>x.encNumero));
    if(encNums.size>0){
      setEncomendas(prev=>prev.map(e=> encNums.has(e.numero) ? {...e, sinalPago:true, historico:[...(e.historico||[]),{data:date, hora:now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), acao:'Pagamento recebido no caixa ('+caixaOrderNum+')', status:e.status}]} : e));
      const encSales=[];
      encCartItems.forEach(x=>{
        if(!sales.some(s=>s.orderNum===x.encNumero) && !encSales.some(s=>s.orderNum===x.encNumero)){
          encSales.push(encSaleRecord({numero:x.encNumero, customer:customer||'Consumidor Final', total:parseFloat((x.price*x.qty).toFixed(2)), payment}));
        }
      });
      if(encSales.length>0) setSales(prev=>[...prev,...encSales]);
      notify(encNums.size+' encomenda(s) paga(s) e lançada(s) nas vendas','success');
    }
    setDone({cart,total,payment,troco,customer:customer||"Consumidor Final",date});
    setCart([]);setCustomer("");setPaid("");
    if(outOfStockAfter.length>0){
      setPostSaleEncItems(outOfStockAfter);
    } else {
      notify("Venda finalizada!","success");
    }
  }
  function handleEncFromCaixa(product, qty=1){
    setOutOfStockModal(null);
    setQuickEncModal({product, qty});
  }
  if(done)return <div style={{maxWidth:480,margin:"0 auto"}}>
    {postSaleEncItems.length>0&&<div style={{background:'#fde8e8',border:'2px solid #cc2222',borderRadius:4,padding:'14px 18px',marginBottom:16}}>
      <div style={{fontFamily:'Oswald',fontSize:13,fontWeight:600,letterSpacing:2,textTransform:'uppercase',color:'#a01010',marginBottom:10}}>⚠ Produto(s) esgotado(s) após esta venda:</div>
      {postSaleEncItems.map((item,i)=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(204,34,34,.15)'}}>
          <div>
            <div style={{fontFamily:'Oswald',fontSize:13,fontWeight:500,textTransform:'uppercase',letterSpacing:1}}>{item.name}</div>
            <div style={{fontFamily:'Share Tech Mono',fontSize:9,color:'#cc2222',marginTop:2}}>ESTOQUE ZERADO</div>
          </div>

            onClick={()=>setQuickEncModal({product:item.product||item,qty:1})}>

          </button>
        </div>
      ))}
    </div>}
    <div className="card" style={{margin:0}}>
    <div style={{textAlign:"center",marginBottom:18}}><div style={{fontSize:44}}>✅</div><div style={{fontFamily:"Bebas Neue",fontSize:24,letterSpacing:4,marginTop:8}}>Venda Concluída</div></div>
    <div className="receipt">
      <div style={{textAlign:"center",fontFamily:"Bebas Neue",fontSize:15,letterSpacing:4,marginBottom:4}}>BOINA PRETA</div>
      <div className="receipt-sep"/>
      {[["Data",done.date],["Cliente",done.customer],["Pagamento",done.payment]].map(([l,v])=><div key={l} className="receipt-line"><span>{l}:</span><span>{v}</span></div>)}
      <div className="receipt-sep"/>
      {done.cart.map(item=><div key={item.id} className="receipt-line"><span>{item.name.substring(0,20)}</span><span>{item.qty}x {fmt(item.price)}</span></div>)}
      <div className="receipt-sep"/>
      <div className="receipt-line receipt-total"><span>TOTAL</span><span>{fmt(done.total)}</span></div>

  </div></div>;

  // Se caixa fechado, mostra tela de abertura
  if(caixa.status==='fechado') return <AberturaCaixaScreen polo={polo} operador={operador} onAbrir={(v,obs)=>{abrir(v,obs);notify('Caixa aberto com fundo de '+fmt(parseFloat(v)),'success');}}/>;

  // Vendas em dinheiro do dia para calcular saldo
  const today=new Date().toLocaleDateString('pt-BR');
  const salesHoje=sales.filter(s=>s.date===today&&s.type==='loja'&&s.status==='Concluído');
  const dinhHoje=salesHoje.filter(s=>s.payment==='Dinheiro').reduce((a,b)=>a+b.total,0);
  const saldoCaixa=totalCaixa(dinhHoje);

  return <div>

    <div style={{background:'#111',borderRadius:4,padding:'12px 18px',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>

        <div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:2,color:'#555',textTransform:'uppercase',marginBottom:2}}>Caixa Aberto</div>
          <div style={{fontFamily:'Oswald',fontSize:11,letterSpacing:1,color:'#bbb',textTransform:'uppercase'}}>
            Desde {caixa.abertura?.hora} · Fundo: {fmt(caixa.abertura?.valor||0)}
          </div>
        </div>
        <div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:2,color:'#555',textTransform:'uppercase',marginBottom:2}}>Saldo est. em caixa</div>
          <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2,color:'#4caf50'}}>{fmt(saldoCaixa)}</div>
        </div>
        {(caixa.movimentos||[]).length>0&&<div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:2,color:'#555',textTransform:'uppercase',marginBottom:2}}>Movimentos</div>
          <div style={{fontFamily:'Share Tech Mono',fontSize:10,color:'#aaa'}}>{caixa.movimentos.length} registro{caixa.movimentos.length!==1?'s':''}</div>
        </div>}
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn btn-sm" style={{background:'transparent',border:'1px solid #333',color:'#aaa'}} onClick={()=>setMovModal('suprimento')}>💵 Suprimento</button>

        <button className="btn btn-sm" style={{background:'transparent',border:'1px solid #554400',color:'#c9a227'}} onClick={()=>setFechModal(true)}>🔒 Fechar Caixa</button>
      </div>
    </div>

    {movModal&&<MovimentoCaixaModal tipo={movModal} onClose={()=>setMovModal(null)}

    {fechModal&&<FechamentoCaixaModal caixa={caixa} salesHoje={salesHoje} polo={polo}
      onClose={()=>setFechModal(false)}
      onFechar={(obs)=>{fechar(obs);notify('Caixa fechado com sucesso','success');setFechModal(false);}}/>}

    <StockAlertBanner products={products}/>
    {confirmVenda&&<Modal title="Confirmar Venda" wide onClose={()=>setConfirmVenda(false)}
      actions={[
        <button key="v" className="btn" onClick={()=>setConfirmVenda(false)}>← Voltar e editar</button>,
        <button key="c" className="btn btn-primary" onClick={fin}>✓ Confirmar Venda</button>
      ]}>
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:'Share Tech Mono',fontSize:9,letterSpacing:2,color:'#aaa',textTransform:'uppercase',marginBottom:8}}>Itens da compra</div>
        <div className="table-wrap"><table>
          <thead><tr>{['Produto','Qtd','Unit.','Subtotal'].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {cart.map(item=>(
              <tr key={item.id}>
                <td><strong>{item.name}</strong>{item.isEncomenda&&<span className="tag tag-integra" style={{marginLeft:6,fontSize:8}}>ENCOMENDA</span>}</td>
                <td className="text-mono">{item.qty}</td>
                <td className="text-mono">{fmt(item.price)}</td>
                <td style={{fontFamily:'Bebas Neue',fontSize:15,letterSpacing:1}}>{fmt(item.price*item.qty)}</td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>
      <div style={{background:'#f9f9f9',border:'1px solid #e8e8e8',borderRadius:6,padding:'14px 18px'}}>
        {[['Cliente',customer||'Consumidor Final'],['Pagamento',payment]].map(([l,v])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13}}><span style={{color:'#888'}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>
        ))}
        {payment==="Dinheiro"&&paid&&<>
          <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13}}><span style={{color:'#888'}}>Recebido</span><span style={{fontWeight:600}}>{fmt(parseFloat(paid)||0)}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13}}><span style={{color:'#888'}}>Troco</span><span style={{fontWeight:600,color:'#1a6e2e'}}>{fmt(troco)}</span></div>
        </>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:10,marginTop:6,borderTop:'1px solid #e0e0e0'}}>
          <span style={{fontFamily:'Oswald',fontSize:14,fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>Total</span>
          <span style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:2}}>{fmt(total)}</span>
        </div>
      </div>
    </Modal>}
    {outOfStockModal&&!outOfStockModal._overQty&&<OutOfStockModal
      product={outOfStockModal}
      onClose={()=>setOutOfStockModal(null)}
      onEncomenda={(p)=>handleEncFromCaixa(p,1)}
    />}
    {quickEncModal&&<QuickEncomendaModal
      product={quickEncModal.product}
      qty={quickEncModal.qty||1}
      customers={customers}
      onClose={()=>setQuickEncModal(null)}
      onSave={(enc)=>{
          setEncomendas(prev=>[...prev,enc]);
          setCart(prev=>{
            const encId='enc_'+quickEncModal.product.id;
            const ex=prev.find(x=>x.id===encId);
            if(ex) return prev.map(x=>x.id===encId?{...x,qty:x.qty+(quickEncModal.qty||1),encNumero:enc.numero}:x);
            return [...prev,{...quickEncModal.product,id:encId,qty:quickEncModal.qty||1,isEncomenda:true,encNumero:enc.numero}];
          });
          setQuickEncModal(null);
          notify("Encomenda "+enc.numero+" adicionada ao carrinho!","success");
        }}
    />}
    {outOfStockModal&&outOfStockModal._overQty&&<PartialStockModal
      product={outOfStockModal}
      requested={outOfStockModal._overQty}
      available={outOfStockModal.stock}
      onClose={()=>setOutOfStockModal(null)}
      onBuyAvailable={(qty)=>{setCart(prev=>prev.map(x=>x.id===outOfStockModal.id?{...x,qty}:x));setOutOfStockModal(null);notify("Carrinho atualizado para "+qty+" un. disponíveis","success");}}
      onEncomendaRest={(buyQty,encQty)=>{setCart(prev=>prev.map(x=>x.id===outOfStockModal.id?{...x,qty:buyQty}:x));const p=outOfStockModal;setOutOfStockModal(null);setQuickEncModal({product:p,qty:encQty});}}
      onEncomendaAll={(qty)=>{setCart(prev=>prev.filter(x=>x.id!==outOfStockModal.id));const p=outOfStockModal;setOutOfStockModal(null);setQuickEncModal({product:p,qty});}}
    />}
    <div className="caixa-grid">
    <div><div className="card"><div className="card-title">Produtos</div>
      <div className="search-box"><span className="search-icon">🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>

      <div className="card-title">Carrinho {cart.length>0&&<span style={{background:"#f0f0f0",padding:"2px 8px",borderRadius:2,fontFamily:"Share Tech Mono",fontSize:10}}>{cart.reduce((a,b)=>a+b.qty,0)} itens</span>}</div>
      {!cart.length?<div className="store-empty" style={{padding:"20px 0"}}><div className="store-empty-icon">🛒</div><div className="store-empty-text" style={{fontSize:11}}>Vazio</div></div>:cart.map(item=><div key={item.id} className="cart-item">
        <div className="cart-thumb">{item.photo?<img src={item.photo} alt=""/>:<span style={{fontFamily:"Share Tech Mono",fontSize:7,color:"#ccc",textAlign:"center",padding:2}}>SEM FOTO</span>}</div>
        <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className="cart-name">{item.name}</div>
              {item.isEncomenda&&<span style={{background:'#e65100',color:'#fff',fontFamily:'Share Tech Mono',fontSize:8,letterSpacing:1,padding:'2px 6px',borderRadius:2}}>ENCOMENDA</span>}
            </div>
            <div className="cart-price">{fmt(item.price)}/un</div>
          <div className="qty-row"><button className="qty-btn" onClick={()=>qty(item.id,item.qty-1)}>−</button><span className="qty-n">{item.qty}</span><button className="qty-btn" onClick={()=>qty(item.id,item.qty+1)}>+</button><span style={{marginLeft:"auto",fontFamily:"Bebas Neue",fontSize:14}}>{fmt(item.price*item.qty)}</span></div>
        </div>
      </div>)}
      <hr className="divider"/>
      <div className="form-group mb-2"><label>Cliente</label><input placeholder="Nome (opcional)" value={customer} onChange={e=>setCustomer(e.target.value)}/></div>
      <div className="form-group mb-2"><label>Pagamento</label><select value={payment} onChange={e=>setPayment(e.target.value)}>{PMTS.map(p=><option key={p}>{p}</option>)}</select></div>
      {payment==="Integra Card — Bolsa Uniforme"&&<div className="integra-pill mb-2"><div style={{fontSize:22}}>🟢</div><div><div className="integra-pill-title">Integra Card</div><div className="integra-pill-sub">Bolsa Uniforme • Governo MG</div></div></div>}
      {payment==="Dinheiro"&&<div className="form-group mb-2"><label>Valor Recebido</label><input type="number" step="0.01" value={paid} onChange={e=>setPaid(e.target.value)} placeholder="0,00"/>{paid&&<div className="text-mono" style={{fontSize:10,color:"#aaa",marginTop:3}}>Troco: {fmt(troco)}</div>}</div>}
      <hr className="divider"/>
      <div className="cart-total-row"><span className="cart-total-lbl">Total</span><span className="cart-total-val">{fmt(total)}</span></div>
      <button className="btn btn-primary w-full" style={{justifyContent:"center"}} onClick={abrirConfirmacao}>✓ Finalizar Venda</button>
      {cart.length>0&&<button className="btn w-full" style={{justifyContent:"center",marginTop:6}} onClick={()=>setCart([])}>Limpar Carrinho</button>}
    </div></div>
  </div>
  </div>;
}

function exportCSV(filename, headers, rows){
  const esc = v => '"'+String(v??'').replace(/"/g,'""')+'"';
  const csv = [headers.map(esc).join(','), ...rows.map(r=>r.map(esc).join(','))].join('\r\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename+'.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function BtnExport({sales, label, polo}){
  const [open,setOpen]=useState(false);
  const ref=React.useRef();
  useEffect(()=>{
    if(!open) return;
    function handle(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handle);
    return()=>document.removeEventListener('mousedown',handle);
  },[open]);

  function doCSV(){
    exportCSV('boina-preta-vendas-'+label.replace(/\//g,'-').replace(/\s+/g,'_'),
      ['Data','Cliente','Produto','SKU','Qtd','Preço Unit.','Total','Custo','Lucro','Pagamento','Canal','Status'],
      sales.map(s=>[s.date,s.customer,s.productName,s.sku||'',s.qty,s.unitPrice||'',s.total,(s.cost||0),(s.total-(s.cost||0)).toFixed(2),s.payment,saleCanal(s).label,s.status])
    );
    setOpen(false);
  }
  function doPDF(){exportPDFVendas(sales,label,polo);setOpen(false);}

  return <div style={{position:'relative',display:'inline-block'}} ref={ref}>
    <button className="btn btn-sm btn-primary" onClick={()=>setOpen(o=>!o)}>
      ↓ Exportar ▾
    </button>
    {open&&<div style={{position:'absolute',right:0,top:'calc(100% + 4px)',background:'#fff',border:'1px solid #e0e0e0',borderRadius:4,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:300,minWidth:180}}>
      <div style={{padding:'4px 0'}}>
        <button onClick={doPDF} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',background:'none',border:'none',cursor:'pointer',fontFamily:'Oswald,sans-serif',fontSize:11,letterSpacing:1,textTransform:'uppercase',color:'#111',textAlign:'left'}}
          onMouseOver={e=>e.currentTarget.style.background='#f5f5f5'} onMouseOut={e=>e.currentTarget.style.background='none'}>
          <span style={{fontSize:16}}>📄</span>
          <div><div>Exportar PDF</div><div style={{fontFamily:'Share Tech Mono',fontSize:8,color:'#aaa',letterSpacing:1,marginTop:1}}>Relatório completo para impressão</div></div>
        </button>
        <div style={{borderTop:'1px solid #f0f0f0',margin:'2px 0'}}/>
        <button onClick={doCSV} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',background:'none',border:'none',cursor:'pointer',fontFamily:'Oswald,sans-serif',fontSize:11,letterSpacing:1,textTransform:'uppercase',color:'#111',textAlign:'left'}}
          onMouseOver={e=>e.currentTarget.style.background='#f5f5f5'} onMouseOut={e=>e.currentTarget.style.background='none'}>
          <span style={{fontSize:16}}>📊</span>
          <div><div>Exportar CSV / Excel</div><div style={{fontFamily:'Share Tech Mono',fontSize:8,color:'#aaa',letterSpacing:1,marginTop:1}}>Abrir no Excel, Sheets ou Numbers</div></div>
        </button>
      </div>
    </div>}
  </div>;
}

function Fechamento({sales,notify}){

    let s;
    if(tab==="diario") s=sales.filter(x=>x.date===todayStr);
    else if(tab==="semanal") s=sales.filter(x=>x.week===thisWeek&&x.month===now.getMonth());
    else s=sales.filter(x=>x.month===month);

  const ms=get();

// ====== MEUS PEDIDOS (cliente) ======
const ORDER_STEPS = [
  {key:"Separar",           label:"Pedido\nRecebido",   icon:"🛒"},
  {key:"Em Separação",      label:"Em\nSeparação",      icon:"📦"},
  {key:"Pronto p/ Retirar", label:"Pronto p/\nRetirar", icon:"🏪"},
  {key:"Pago",              label:"Pago",                icon:"✅"},
  {key:"Entregue",          label:"Entregue",            icon:"🎉"},
];

function MeusPedidos({sales, currentUser, onBack}){
  const [expanded, setExpanded] = React.useState(null);

  // Build orders grouped by orderNum or fallback customer+date
  const pedidosMap = {};
  sales.filter(s => s.type==='online' && s.customer===currentUser?.name).forEach(s=>{
    const key = s.orderNum || (s.customer+'|'+s.date);
    if(!pedidosMap[key]){
      pedidosMap[key]={
        key, num: s.orderNum||key,
        date: s.date, ts: s.ts||0,
        payment: s.payment,
        items:[], total:0,
        status: s.pedidoStatus || 'Separar'
      };
    }
    pedidosMap[key].items.push(s);
    pedidosMap[key].total += s.total;
    if(s.status==='Aguardando Pagamento') pedidosMap[key].status='Aguardando Pagamento';
    if(s.pedidoStatus) pedidosMap[key].status=s.pedidoStatus;
  });
  const pedidos = Object.values(pedidosMap).sort((a,b)=>b.ts-a.ts);

  function statusInfo(status){
    if(status==='Separar')           return {cls:'separando',  msg:'🛒 Pedido recebido! Estamos preparando a separação.'};
    if(status==='Em Separação')      return {cls:'separando',  msg:'📦 Estamos separando os itens do seu pedido.'};
    if(status==='Pronto p/ Retirar') return {cls:'pronto',     msg:'🏪 Seu pedido está pronto! Pode vir retirar na loja.'};
    if(status==='Pago')              return {cls:'separando',  msg:'✅ Pagamento confirmado na retirada. Obrigado!'};
    if(status==='Entregue')          return {cls:'entregue',   msg:'🎉 Pedido entregue. Obrigado pela preferência!'};
    if(status==='Cancelado')         return {cls:'cancelado',  msg:'❌ Este pedido foi cancelado. Entre em contato com a loja.'};
    return {cls:'separando', msg:''};
  }

  function stepState(stepKey, orderStatus){
    if(orderStatus==='Cancelado') return 'cancelled';
    const stepIdx  = ORDER_STEPS.findIndex(s=>s.key===stepKey);
    const curIdx   = ORDER_STEPS.findIndex(s=>s.key===orderStatus);
    if(stepIdx < curIdx)  return 'done';
    if(stepIdx === curIdx) return 'active';
    return 'idle';
  }

  return (
    <div className="mp-root">
      <div className="mp-header">
        <button className="mp-back" onClick={onBack}>← Voltar à loja</button>
        <div className="mp-title">Meus Pedidos</div>
        <div className="mp-subtitle">{currentUser?.name} · {pedidos.length} pedido{pedidos.length!==1?'s':''}</div>
      </div>

      {pedidos.length===0 && (
        <div className="mp-empty">
          <div className="mp-empty-icon">🛒</div>
          <div className="mp-empty-text">Nenhum pedido ainda</div>
          <div className="mp-empty-sub">Seus pedidos online aparecerão aqui</div>
          <button className="btn btn-primary" style={{marginTop:20}} onClick={onBack}>Ver produtos</button>
        </div>
      )}

      {pedidos.map(p=>{
        const open = expanded===p.key;
        const {cls, msg} = statusInfo(p.status);
        const isCancelled = p.status==='Cancelado';
        return (
          <div key={p.key} className="mp-order">
            <div className="mp-order-head" onClick={()=>setExpanded(open?null:p.key)}>
              <div style={{flex:1}}>
                <div className="mp-order-num">#{p.num}</div>
                <div className="mp-order-date">{p.date} · {p.payment}</div>
              </div>
              <div>
                <div className="mp-order-total-lbl">Total</div>
                <div className="mp-order-total">{fmt(p.total)}</div>
              </div>
              <div style={{marginLeft:12}}>
                <span className={`tag ${PEDIDO_STATUS_CLS[p.status]||'tag-pending'}`}>{p.status}</span>
              </div>
              <span className={`mp-chevron ${open?'open':''}`}>▼</span>
            </div>

            {open && (
              <div className="mp-order-body">
                {/* Status banner */}
                <div className={`mp-status-banner ${cls}`}>
                  <span style={{fontSize:18,flexShrink:0}}>{statusInfo(p.status).msg.split(' ')[0]}</span>
                  <span>{msg.replace(/^.\s/,'')}</span>
                </div>

                {/* Timeline */}
                {!isCancelled && (
                  <div className="mp-timeline">
                    {ORDER_STEPS.map((step,i)=>{
                      const state = stepState(step.key, p.status);
                      return (
                        <div key={step.key} className="mp-step">
                          {i<ORDER_STEPS.length-1 && <div className={`mp-step-line ${state==='done'?'done':''}`}/>}
                          <div className={`mp-step-dot ${state}`}>
                            {state==='done'?'✓': state==='active'? step.icon : '·'}
                          </div>
                          {step.label.split('\n').map((ln,j)=>(
                            <div key={j} className={`mp-step-label ${state==='idle'?'':state}`}>{ln}</div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Items */}
                <div className="mp-items-list">
                  {p.items.map((item,i)=>(
                    <div key={i} className="mp-item-row">
                      <div className="mp-item-name">{item.productName}</div>
                      <div className="mp-item-qty">x{item.qty}</div>
                      <div className="mp-item-price">{fmt(item.total)}</div>
                    </div>
                  ))}
                  <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4,borderTop:'1px solid #e8e8e8'}}>
                    <span style={{fontFamily:'Oswald',fontSize:13,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'#555'}}>Total do Pedido</span>
                    <span style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2}}>{fmt(p.total)}</span>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function CustomerStore({polo,onTrocarPolo,products,categories,sales,setSales,setProducts,currentUser,setCurrentUser,customers,setCustomers,setEncomendas,onShowAuth,notify}){
  const [cart,setCart]=useState([]),[cartOpen,setCartOpen]=useState(false),[search,setSearch]=useState(""),[cat,setCat]=useState("Todos"),[step,setStep]=useState("catalog"),[orderForm,setOrderForm]=useState({delivery:"retirada",address:"",payment:"Pix"}),[orderResult,setOrderResult]=useState(null);
  const [storeOutModal,setStoreOutModal]=useState(null);
  const [storePartialModal,setStorePartialModal]=useState(null);
  const [storeQuickEncModal,setStoreQuickEncModal]=useState(null);
  const filtered=products.filter(p=>(cat==="Todos"||p.category===cat)&&p.name.toLowerCase().includes(search.toLowerCase()));
  const cartTotal=cart.reduce((a,b)=>a+b.price*b.qty,0);
  const frete=0;
  function addCart(p){
    if(p.stock===0){setStoreOutModal(p);return;}
    const ex=cart.find(x=>x.id===p.id&&!x.isEncomenda);
    if(ex&&ex.qty>=p.stock){setStoreOutModal({...p,_overQty:ex.qty+1});return;}
    setCart(prev=>{
      const existing=prev.find(x=>x.id===p.id&&!x.isEncomenda);
      if(existing) return prev.map(x=>x.id===p.id&&!x.isEncomenda?{...x,qty:x.qty+1}:x);
      return[...prev,{...p,qty:1}];
    });
    setCartOpen(true);
  }
  function setCartQty(id, q){
    const p=products.find(x=>x.id===id);
    if(!p) return;
    if(q<=0){setCart(prev=>prev.filter(x=>x.id!==id));return;}
    if(q>p.stock){
      setStoreOutModal({...p,_overQty:q});
      return;
    }
    setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));
  }
  function qtyUpd(id,q){
    if(q<=0){setCart(prev=>prev.filter(x=>x.id!==id));return;}
    const cartItem=cart.find(x=>x.id===id);
    if(cartItem&&cartItem.isEncomenda){
      setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));
      return;
    }
    const p=products.find(x=>x.id===id);
    if(p&&q>p.stock){setStoreOutModal({...p,_overQty:q});return;}
    setCart(prev=>prev.map(x=>x.id===id?{...x,qty:q}:x));
  }
  function placeOrder(){
    if(!currentUser){onShowAuth();return;}
    const now=new Date(),date=now.toLocaleDateString("pt-BR"),orderNum="BP"+String(now.getTime()).slice(-6)+Math.floor(Math.random()*9);
    const ns=cart.map(item=>({id:Date.now()+Math.random(),productId:item.id,productName:item.name,qty:item.qty,unitPrice:item.price,total:parseFloat((item.price*item.qty).toFixed(2)),cost:parseFloat((item.cost*item.qty).toFixed(2)),month:now.getMonth(),week:getWeekNum(now),date,ts:now.getTime(),payment:orderForm.payment,type:"online",status:"Concluído",pedidoStatus:"Separar",customer:currentUser.name,orderNum,orderTs:now.getTime()}));
    setSales(prev=>[...prev,...ns]);
    setProducts(prev=>prev.map(p=>{const c=cart.find(x=>x.id===p.id&&!x.isEncomenda);return c?{...p,stock:Math.max(0,p.stock-c.qty)}:p;}));
    // registra movimentação online
    cart.filter(x=>!x.isEncomenda).forEach(item=>{
      const p=products.find(x=>x.id===item.id);
      if(p) registrarMov(polo?.id||'',p,'saida_venda_online',p.stock,-item.qty,orderNum,currentUser.name,'Loja Online');
    });
    setOrderResult({orderNum,delivery:orderForm.delivery,payment:orderForm.payment,total:cartTotal+frete,items:[...cart],date});
    setCart([]);setStep("confirmed");
  }
  if(step==="meus-pedidos") return <div className="store-root">
    <div className="store-polo-bar">
      <div className="store-polo-bar-inner">
        <span className="store-polo-name">Polo {polo?.sigla} — {polo?.nome}</span>

    <div style={{background:"#111",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <img src={LOGO} alt="Boina Preta" style={{height:48,objectFit:"contain"}}/>
